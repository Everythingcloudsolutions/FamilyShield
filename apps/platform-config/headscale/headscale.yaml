server_url: https://vpn-dev.everythingcloud.ca
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090
grpc_listen_addr: 127.0.0.1:50443

private_key_path: /var/lib/headscale/private.key

disable_check_updates: true

noise:
  private_key_path: /var/lib/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48

derp:
  server:
    enabled: false
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  auto_update_enabled: true
  update_frequency: 24h

dns:
  # Push AdGuard Home as the DNS resolver to all enrolled devices automatically.
  # Devices receive 172.20.0.2 (AdGuard's Docker bridge IP on the OCI VM) via
  # Tailscale DNS push — no manual DNS config on the child's device is required.
  # override_local_dns: true replaces the device's existing resolver entirely,
  # so ISP DNS cannot bypass AdGuard's blocklists.
  magic_dns: false
  nameservers:
    global:
      - 172.20.0.2
  override_local_dns: true

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite
