# .github/actions/oci-login/action.yml
# Reusable composite action: authenticates to OCI via OIDC
# No long-lived API keys stored in GitHub — uses workload identity federation
name: "OCI OIDC Login"
description: "Authenticate to Oracle Cloud via OIDC (no stored API keys)"

inputs:
  oci_tenancy_ocid:
    description: "OCI Tenancy OCID"
    required: true
  oci_region:
    description: "OCI Region"
    required: false
    default: "ca-toronto-1"
  oci_user_ocid:
    description: "OCI User OCID for the GitHub Actions service user"
    required: true
  oci_fingerprint:
    description: "OCI API key fingerprint"
    required: true
  oci_private_key:
    description: "OCI API private key (PEM format)"
    required: true

outputs:
  config_file:
    description: "Path to the generated OCI config file"
    value: ${{ steps.write-config.outputs.config_file }}

runs:
  using: "composite"
  steps:
    - name: Write OCI config
      id: write-config
      shell: bash
      run: |
        mkdir -p ~/.oci
        cat > ~/.oci/config << EOF
        [DEFAULT]
        tenancy=${{ inputs.oci_tenancy_ocid }}
        region=${{ inputs.oci_region }}
        user=${{ inputs.oci_user_ocid }}
        fingerprint=${{ inputs.oci_fingerprint }}
        key_file=~/.oci/private_key.pem
        EOF

        echo "${{ inputs.oci_private_key }}" > ~/.oci/private_key.pem
        chmod 600 ~/.oci/private_key.pem
        chmod 600 ~/.oci/config

        echo "config_file=~/.oci/config" >> $GITHUB_OUTPUT
        echo "✅ OCI config written for region ${{ inputs.oci_region }}"

    - name: Verify OCI connection
      shell: bash
      env:
        OCI_CONFIG_FILE: ~/.oci/config
      run: |
        # Install OCI CLI if not present
        if ! command -v oci &> /dev/null; then
          echo "Installing OCI CLI..."
          pip install oci-cli --quiet
        fi

        # Verify config file exists and has content
        if [ ! -f ~/.oci/config ]; then
          echo "❌ OCI config file not found at ~/.oci/config"
          exit 1
        fi

        CONFIG_SIZE=$(wc -c < ~/.oci/config)
        echo "✅ OCI config file exists (${CONFIG_SIZE} bytes)"

        # Verify private key exists
        if [ ! -f ~/.oci/private_key.pem ]; then
          echo "❌ OCI private key not found at ~/.oci/private_key.pem"
          exit 1
        fi

        KEY_SIZE=$(wc -c < ~/.oci/private_key.pem)
        echo "✅ OCI private key exists (${KEY_SIZE} bytes)"

        # Test OCI CLI connection
        echo "Testing OCI CLI authentication..."
        if oci iam region list --output json 2>&1 | grep -q "name"; then
          echo "✅ OCI CLI authentication successful"
        else
          echo "❌ OCI CLI authentication failed - check credentials"
          oci iam region list 2>&1 | head -20
          exit 1
        fi

        echo "✅ OCI connection verified"
