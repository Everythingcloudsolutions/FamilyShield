# .github/actions/tofu-apply/action.yml
name: "OpenTofu Apply"
description: "Run tofu apply against a target environment"

inputs:
  environment:
    description: "Target environment: dev | staging | prod"
    required: true
  working_directory:
    description: "IaC working directory"
    required: false
    default: "iac"
  var_file:
    description: "Path to tfvars file"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup OpenTofu
      uses: opentofu/setup-opentofu@v1
      with:
        tofu_version: "1.6.x"

    - name: Tofu Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ca-toronto-1
      run: |
        tofu init \
          -backend-config="bucket=familyshield-tfstate" \
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
          -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
          -backend-config="region=ca-toronto-1" \
          -backend-config="skip_region_validation=true" \
          -backend-config="skip_credentials_validation=true" \
          -backend-config="skip_metadata_api_check=true" \
          -backend-config="use_path_style=true" \
          -reconfigure
        echo "✅ tofu init with remote S3 backend complete"

    - name: Delete problematic Cloudflare state entries
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        # Remove tunnel and tunnel_config from state to prevent "Configuration for tunnel not found" errors
        # These resources will be recreated fresh by tofu apply
        echo "Removing problematic Cloudflare resources from state..."
        echo ""

        # Check if tunnel exists in state
        echo "Listing state resources:"
        if tofu state list 2>/dev/null | grep -q "cloudflare_tunnel"; then
          echo "Found cloudflare_tunnel in state, removing..."
          tofu state rm -force 'module.cloudflare.cloudflare_tunnel.main'
          echo "✅ Tunnel removed"
        else
          echo "No cloudflare_tunnel in state"
        fi

        if tofu state list 2>/dev/null | grep -q "cloudflare_tunnel_config"; then
          echo "Found cloudflare_tunnel_config in state, removing..."
          tofu state rm -force 'module.cloudflare.cloudflare_tunnel_config.main'
          echo "✅ Tunnel config removed"
        else
          echo "No cloudflare_tunnel_config in state"
        fi

        echo ""
        echo "✅ State cleanup complete"

    - name: Tofu Refresh (sync state with cloud)
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        VAR_FILE_ARG=""
        if [ -n "${{ inputs.var_file }}" ]; then
          VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
        fi

        tofu refresh \
          -var="environment=${{ inputs.environment }}" \
          $VAR_FILE_ARG \
          -no-color || true

        echo "✅ tofu refresh complete (state synced with cloud)"

    - name: Tofu Apply
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        VAR_FILE_ARG=""
        if [ -n "${{ inputs.var_file }}" ]; then
          VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
        fi

        tofu apply \
          -var="environment=${{ inputs.environment }}" \
          $VAR_FILE_ARG \
          -auto-approve \
          -no-color

        echo "✅ tofu apply complete for ${{ inputs.environment }}"

    - name: Capture outputs
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "## 🚀 Deploy outputs — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        tofu output -no-color 2>/dev/null | grep -v "sensitive" >> $GITHUB_STEP_SUMMARY || true
