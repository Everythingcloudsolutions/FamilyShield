# .github/actions/tofu-apply/action.yml
name: "OpenTofu Apply"
description: "Run tofu apply against a target environment"

inputs:
  environment:
    description: "Target environment: dev | staging | prod"
    required: true
  working_directory:
    description: "IaC working directory"
    required: false
    default: "iac"
  var_file:
    description: "Path to tfvars file"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup OpenTofu
      uses: opentofu/setup-opentofu@v1
      with:
        tofu_version: "1.6.x"

    - name: Tofu Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ca-toronto-1
      run: |
        tofu init \
          -backend-config="bucket=familyshield-tfstate" \
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
          -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
          -backend-config="region=ca-toronto-1" \
          -backend-config="skip_region_validation=true" \
          -backend-config="skip_credentials_validation=true" \
          -backend-config="skip_metadata_api_check=true" \
          -backend-config="use_path_style=true" \
          -reconfigure
        echo "✅ tofu init with remote S3 backend complete"

    - name: Cleanup orphaned resources and import existing buckets
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "🗑️  Cleaning up orphaned Cloudflare resources from state..."
        tofu state rm module.cloudflare.cloudflare_tunnel.main 2>/dev/null && echo "✅ Removed cloudflare_tunnel.main" || true
        tofu state rm module.cloudflare.cloudflare_tunnel_config.main 2>/dev/null && echo "✅ Removed cloudflare_tunnel_config.main" || true
        tofu state rm module.cloudflare 2>/dev/null && echo "✅ Removed cloudflare module" || true
        echo "✅ State cleanup complete"

        # Proactively import existing Object Storage buckets if they exist in OCI but not in state
        echo ""
        echo "📋 Checking for existing Object Storage buckets to import..."
        for BUCKET_NAME in "familyshield-tfstate-${{ inputs.environment }}" "familyshield-backups-${{ inputs.environment }}" "familyshield-app-${{ inputs.environment }}"; do
          BUCKET_TYPE=$(echo "$BUCKET_NAME" | sed "s/familyshield-//;s/-${{ inputs.environment }}//")
          if ! tofu state list 2>/dev/null | grep -q "module.storage.oci_objectstorage_bucket.$BUCKET_TYPE"; then
            # Check if bucket exists in OCI
            BUCKET_EXISTS=$(oci os bucket get --namespace-name "$TF_VAR_oci_namespace" --bucket-name "$BUCKET_NAME" --query "name" --raw-output 2>/dev/null || echo "")
            if [ -n "$BUCKET_EXISTS" ] && [ "$BUCKET_EXISTS" != "None" ]; then
              echo "✅ Found existing bucket in OCI: $BUCKET_NAME"
              echo "   Importing into state as module.storage.oci_objectstorage_bucket.$BUCKET_TYPE..."
              tofu import "module.storage.oci_objectstorage_bucket.$BUCKET_TYPE" "$BUCKET_NAME" 2>/dev/null && echo "   ✅ Bucket imported" || echo "   ⚠️  Import may have failed, will retry on apply"
            fi
          else
            echo "✅ Bucket $BUCKET_NAME already in state"
          fi
        done

    - name: Tofu Refresh (sync state with cloud)
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        VAR_FILE_ARG=""
        if [ -n "${{ inputs.var_file }}" ]; then
          VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
        fi

        tofu refresh \
          -var="environment=${{ inputs.environment }}" \
          $VAR_FILE_ARG \
          -no-color

        echo "✅ tofu refresh complete (state synced with cloud)"

    - name: Tofu Apply
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        VAR_FILE_ARG=""
        if [ -n "${{ inputs.var_file }}" ]; then
          VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
        fi

        tofu apply \
          -var="environment=${{ inputs.environment }}" \
          $VAR_FILE_ARG \
          -auto-approve \
          -no-color || {
          # If apply failed, try to import existing resources and retry
          echo "ℹ️  First apply attempt failed. Attempting to import existing resources..."

          # Try to import existing buckets if they exist
          echo ""
          echo "Checking for existing Object Storage buckets..."
          for BUCKET_NAME in "familyshield-tfstate-${{ inputs.environment }}" "familyshield-backups-${{ inputs.environment }}" "familyshield-app-${{ inputs.environment }}"; do
            BUCKET_TYPE=$(echo "$BUCKET_NAME" | sed "s/familyshield-//;s/-${{ inputs.environment }}//")
            BUCKET_EXISTS=$(oci os bucket get --namespace-name "$TF_VAR_oci_namespace" --bucket-name "$BUCKET_NAME" --query "name" --raw-output 2>/dev/null || echo "")
            if [ -n "$BUCKET_EXISTS" ] && [ "$BUCKET_EXISTS" != "None" ]; then
              echo "✅ Found existing bucket: $BUCKET_NAME"
              tofu import "module.storage.oci_objectstorage_bucket.$BUCKET_TYPE" "$BUCKET_NAME" 2>&1 || true
            fi
          done

          # Retry apply
          echo ""
          echo "Retrying apply after importing existing resources..."
          tofu apply \
            -var="environment=${{ inputs.environment }}" \
            $VAR_FILE_ARG \
            -auto-approve \
            -no-color
        }

        echo "✅ tofu apply complete for ${{ inputs.environment }}"

    - name: Capture outputs
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "## 🚀 Deploy outputs — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        tofu output -no-color 2>/dev/null | grep -v "sensitive" >> $GITHUB_STEP_SUMMARY || true
