# .github/actions/tofu-apply/action.yml
name: "OpenTofu Apply"
description: "Run tofu apply against a target environment"

inputs:
  environment:
    description: "Target environment: dev | staging | prod"
    required: true
  working_directory:
    description: "IaC working directory"
    required: false
    default: "iac"
  var_file:
    description: "Path to tfvars file"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup OpenTofu
      uses: opentofu/setup-opentofu@v1
      with:
        tofu_version: "1.6.x"

    - name: Tofu Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ca-toronto-1
      run: |
        tofu init \
          -backend-config="bucket=familyshield-tfstate" \
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
          -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
          -backend-config="region=ca-toronto-1" \
          -backend-config="skip_region_validation=true" \
          -backend-config="skip_credentials_validation=true" \
          -backend-config="skip_metadata_api_check=true" \
          -backend-config="use_path_style=true" \
          -reconfigure
        echo "✅ tofu init with remote S3 backend complete"

    - name: Cleanup existing Cloudflare resources
      shell: bash
      run: |
        # Skip if no Cloudflare token
        if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_ZONE_ID" ]; then
          echo "⚠️  Missing Cloudflare credentials, skipping cleanup"
          exit 0
        fi

        echo "Cleaning up existing Cloudflare resources for ${{ inputs.environment }}..."

        # Delete tunnel by name pattern
        TUNNEL_NAME="familyshield-${{ inputs.environment }}"
        TUNNEL_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/tunnels" \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          2>/dev/null | jq -r ".result[] | select(.name==\"${TUNNEL_NAME}\") | .id // empty" 2>/dev/null)

        if [ -n "$TUNNEL_ID" ]; then
          curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/tunnels/${TUNNEL_ID}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" 2>/dev/null
          echo "✅ Cleaned up tunnel: ${TUNNEL_NAME}"
        fi

        # Delete DNS records matching environment pattern
        for RECORD_NAME in "portal-${{ inputs.environment }}" "adguard-${{ inputs.environment }}" "grafana-${{ inputs.environment }}" "vpn-${{ inputs.environment }}"; do
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            2>/dev/null | jq -r ".result[] | select(.name | startswith(\"${RECORD_NAME}\")) | .id // empty" 2>/dev/null | head -1)

          if [ -n "$RECORD_ID" ]; then
            curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records/${RECORD_ID}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" 2>/dev/null
            echo "✅ Cleaned up DNS record: ${RECORD_NAME}"
          fi
        done

        # Delete access applications by name pattern
        for APP_NAME in "adguard-${{ inputs.environment }}" "grafana-${{ inputs.environment }}"; do
          APP_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/access/apps" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            2>/dev/null | jq -r ".result[] | select(.name==\"${APP_NAME}\") | .id // empty" 2>/dev/null)

          if [ -n "$APP_ID" ]; then
            curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/access/apps/${APP_ID}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" 2>/dev/null
            echo "✅ Cleaned up access app: ${APP_NAME}"
          fi
        done

        echo "✅ Cloudflare pre-deployment cleanup complete (or nothing to clean)"

    - name: Clean up state entries for deleted Cloudflare resources
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        # Remove Cloudflare tunnel and config from state if they were deleted
        # This prevents "Configuration for tunnel not found" errors during refresh
        echo "Removing deleted Cloudflare resources from state..."

        tofu state list 2>/dev/null | grep -E "cloudflare_tunnel|cloudflare_record|cloudflare_access_application" | while read resource; do
          # Check if resource still exists in the API (for records and apps only, tunnel is harder to check)
          if echo "$resource" | grep -q "cloudflare_record\|cloudflare_access_application"; then
            # Remove from state if it was part of our cleanup
            if echo "$resource" | grep -q "portal\|adguard\|grafana\|vpn"; then
              tofu state rm "$resource" 2>/dev/null && echo "✅ Removed from state: $resource" || true
            fi
          elif echo "$resource" | grep -q "cloudflare_tunnel"; then
            # Always remove tunnel and tunnel_config on re-deploy to avoid state conflicts
            tofu state rm "$resource" 2>/dev/null && echo "✅ Removed tunnel from state: $resource" || true
          fi
        done

        echo "✅ State cleanup complete"

    - name: Tofu Refresh (sync state with cloud)
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        VAR_FILE_ARG=""
        if [ -n "${{ inputs.var_file }}" ]; then
          VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
        fi

        tofu refresh \
          -var="environment=${{ inputs.environment }}" \
          $VAR_FILE_ARG \
          -no-color || true

        echo "✅ tofu refresh complete (state synced with cloud)"

    - name: Tofu Apply
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        VAR_FILE_ARG=""
        if [ -n "${{ inputs.var_file }}" ]; then
          VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
        fi

        tofu apply \
          -var="environment=${{ inputs.environment }}" \
          $VAR_FILE_ARG \
          -auto-approve \
          -no-color

        echo "✅ tofu apply complete for ${{ inputs.environment }}"

    - name: Capture outputs
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "## 🚀 Deploy outputs — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        tofu output -no-color 2>/dev/null | grep -v "sensitive" >> $GITHUB_STEP_SUMMARY || true
