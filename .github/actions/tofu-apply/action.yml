# .github/actions/tofu-apply/action.yml
name: "OpenTofu Apply"
description: "Run tofu apply against a target environment"

inputs:
  environment:
    description: "Target environment: dev | staging | prod"
    required: true
  working_directory:
    description: "IaC working directory"
    required: false
    default: "iac"
  var_file:
    description: "Path to tfvars file"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup OpenTofu
      uses: opentofu/setup-opentofu@v1
      with:
        tofu_version: "1.6.x"

    - name: Tofu Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ca-toronto-1
      run: |
        tofu init \
          -backend-config="bucket=familyshield-tfstate" \
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
          -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
          -backend-config="region=ca-toronto-1" \
          -backend-config="skip_region_validation=true" \
          -backend-config="skip_credentials_validation=true" \
          -backend-config="skip_metadata_api_check=true" \
          -backend-config="use_path_style=true" \
          -reconfigure
        echo "✅ tofu init with remote S3 backend complete"

    - name: Cleanup orphaned resources
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        OCI_NAMESPACE: ${{ env.OCI_NAMESPACE }}
        TF_VAR_oci_tenancy_ocid: ${{ env.TF_VAR_oci_tenancy_ocid }}
        TF_VAR_oci_namespace: ${{ env.TF_VAR_oci_namespace }}
        TF_VAR_ssh_public_key: ${{ env.TF_VAR_ssh_public_key }}
        TF_VAR_adguard_admin_password: ${{ env.TF_VAR_adguard_admin_password }}
        TF_VAR_supabase_url: ${{ env.TF_VAR_supabase_url }}
        TF_VAR_supabase_anon_key: ${{ env.TF_VAR_supabase_anon_key }}
        TF_VAR_groq_api_key: ${{ env.TF_VAR_groq_api_key }}
        TF_VAR_anthropic_api_key: ${{ env.TF_VAR_anthropic_api_key }}
      run: |
        echo "🗑️  Cleaning up orphaned resources from state..."

        # Remove Cloudflare resources (managed separately now)
        tofu state rm module.cloudflare.cloudflare_tunnel.main 2>/dev/null && echo "✅ Removed cloudflare_tunnel.main" || true
        tofu state rm module.cloudflare.cloudflare_tunnel_config.main 2>/dev/null && echo "✅ Removed cloudflare_tunnel_config.main" || true
        tofu state rm module.cloudflare 2>/dev/null && echo "✅ Removed cloudflare module" || true

        # Remove stale bucket resources — bucket is now a data source (bootstrap owns it)
        tofu state rm module.storage.oci_objectstorage_bucket.tfstate 2>/dev/null && echo "✅ Removed stale bucket resource from state" || true
        tofu state rm module.storage.oci_objectstorage_bucket.backups 2>/dev/null && echo "✅ Removed old backups bucket resource" || true
        tofu state rm module.storage.oci_objectstorage_bucket.app_data 2>/dev/null && echo "✅ Removed old app_data bucket resource" || true

        echo "✅ State cleanup complete"

    - name: Tofu Refresh (sync state with cloud)
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        TF_VAR_oci_tenancy_ocid: ${{ env.TF_VAR_oci_tenancy_ocid }}
        TF_VAR_oci_namespace: ${{ env.TF_VAR_oci_namespace }}
        TF_VAR_ssh_public_key: ${{ env.TF_VAR_ssh_public_key }}
        TF_VAR_adguard_admin_password: ${{ env.TF_VAR_adguard_admin_password }}
        TF_VAR_supabase_url: ${{ env.TF_VAR_supabase_url }}
        TF_VAR_supabase_anon_key: ${{ env.TF_VAR_supabase_anon_key }}
        TF_VAR_groq_api_key: ${{ env.TF_VAR_groq_api_key }}
        TF_VAR_anthropic_api_key: ${{ env.TF_VAR_anthropic_api_key }}
      run: |
        VAR_FILE_ARG=""
        if [ -n "${{ inputs.var_file }}" ]; then
          VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
        fi

        tofu refresh \
          -var="environment=${{ inputs.environment }}" \
          $VAR_FILE_ARG \
          -no-color

        echo "✅ tofu refresh complete (state synced with cloud)"

    - name: Tofu Apply
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        OCI_NAMESPACE: ${{ env.OCI_NAMESPACE }}
        TF_VAR_oci_tenancy_ocid: ${{ env.TF_VAR_oci_tenancy_ocid }}
        TF_VAR_oci_namespace: ${{ env.TF_VAR_oci_namespace }}
        TF_VAR_ssh_public_key: ${{ env.TF_VAR_ssh_public_key }}
        TF_VAR_adguard_admin_password: ${{ env.TF_VAR_adguard_admin_password }}
        TF_VAR_supabase_url: ${{ env.TF_VAR_supabase_url }}
        TF_VAR_supabase_anon_key: ${{ env.TF_VAR_supabase_anon_key }}
        TF_VAR_groq_api_key: ${{ env.TF_VAR_groq_api_key }}
        TF_VAR_anthropic_api_key: ${{ env.TF_VAR_anthropic_api_key }}
      run: |
        VAR_FILE_ARG=""
        if [ -n "${{ inputs.var_file }}" ]; then
          VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
        fi

        tofu apply \
          -var="environment=${{ inputs.environment }}" \
          $VAR_FILE_ARG \
          -auto-approve \
          -no-color

        echo "✅ tofu apply complete for ${{ inputs.environment }}"

    - name: Capture outputs
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "## 🚀 Deploy outputs — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        tofu output -no-color 2>/dev/null | grep -v "sensitive" >> $GITHUB_STEP_SUMMARY || true
