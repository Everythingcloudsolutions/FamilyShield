# .github/actions/tofu-apply/action.yml
name: "OpenTofu Apply"
description: "Run tofu apply against a target environment"

inputs:
  environment:
    description: "Target environment: dev | staging | prod"
    required: true
  working_directory:
    description: "IaC working directory"
    required: false
    default: "iac"
  var_file:
    description: "Path to tfvars file"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup OpenTofu
      uses: opentofu/setup-opentofu@v1
      with:
        tofu_version: "1.6.x"

    - name: Tofu Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ca-toronto-1
      run: |
        tofu init \
          -backend-config="bucket=familyshield-tfstate" \
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
          -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
          -backend-config="region=ca-toronto-1" \
          -backend-config="skip_region_validation=true" \
          -backend-config="skip_credentials_validation=true" \
          -backend-config="skip_metadata_api_check=true" \
          -backend-config="use_path_style=true" \
          -reconfigure
        echo "✅ tofu init with remote S3 backend complete"

    - name: Delete existing Cloudflare and OCI resources
      shell: bash
      run: |
        # With a fresh state file, we have "already exists" errors
        # Solution: delete all managed resources from the cloud, then tofu can create fresh
        echo "Deleting existing Cloudflare resources for ${{ inputs.environment }}..."

        # Delete Cloudflare DNS records
        ZONE_ID="${CLOUDFLARE_ZONE_ID}"
        if [ -z "$ZONE_ID" ]; then
          echo "No CLOUDFLARE_ZONE_ID, skipping DNS cleanup"
        else
          for RECORD_NAME in "portal-${{ inputs.environment }}" "adguard-${{ inputs.environment }}" "grafana-${{ inputs.environment }}" "vpn-${{ inputs.environment }}"; do
            echo "Deleting DNS record: $RECORD_NAME"
            curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              2>/dev/null | jq -r ".result[] | select(.name | startswith(\"${RECORD_NAME}\")) | .id" | while read id; do
              [ -n "$id" ] && curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${id}" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" 2>/dev/null
            done
          done
        fi

        # Delete Cloudflare tunnel
        TUNNEL_NAME="familyshield-${{ inputs.environment }}"
        echo "Deleting Cloudflare tunnel: $TUNNEL_NAME"
        curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/tunnels" \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          2>/dev/null | jq -r ".result[] | select(.name==\"${TUNNEL_NAME}\") | .id" | while read id; do
          [ -n "$id" ] && curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/tunnels/${id}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" 2>/dev/null
        done

        # Delete Cloudflare access apps
        for APP_NAME in "adguard-${{ inputs.environment }}" "grafana-${{ inputs.environment }}"; do
          echo "Deleting access app: $APP_NAME"
          curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/access/apps" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            2>/dev/null | jq -r ".result[] | select(.name==\"${APP_NAME}\") | .id" | while read id; do
            [ -n "$id" ] && curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/access/apps/${id}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" 2>/dev/null
          done
        done

        echo "✅ Cloud resource cleanup complete"

    - name: Tofu Refresh (sync state with cloud)
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        VAR_FILE_ARG=""
        if [ -n "${{ inputs.var_file }}" ]; then
          VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
        fi

        tofu refresh \
          -var="environment=${{ inputs.environment }}" \
          $VAR_FILE_ARG \
          -no-color || true

        echo "✅ tofu refresh complete (state synced with cloud)"

    - name: Tofu Apply
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        VAR_FILE_ARG=""
        if [ -n "${{ inputs.var_file }}" ]; then
          VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
        fi

        tofu apply \
          -var="environment=${{ inputs.environment }}" \
          $VAR_FILE_ARG \
          -auto-approve \
          -no-color

        echo "✅ tofu apply complete for ${{ inputs.environment }}"

    - name: Capture outputs
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "## 🚀 Deploy outputs — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        tofu output -no-color 2>/dev/null | grep -v "sensitive" >> $GITHUB_STEP_SUMMARY || true
