# .github/workflows/deploy-cloudflare.yml
# Manages Cloudflare resources (tunnel, DNS, access apps) via API
# Called after successful IaC deployment to set up public routing
# Can also be called manually for troubleshooting or updates
name: Deploy → Cloudflare

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
        description: "Target environment: dev | staging | prod"
      action:
        type: string
        required: false
        default: "setup"
        description: "Action: setup | cleanup"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment: dev | staging | prod"
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: "Action to perform: setup | cleanup"
        required: true
        type: choice
        options: [setup, cleanup]
        default: setup

permissions:
  contents: read
  id-token: write

jobs:
  # ── Validate Previous Workflow ───────────────────────────────────────────
  gate:
    name: Check IaC deployment
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_call' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "✅ Proceeding with Cloudflare setup (trigger: ${{ github.event_name }})"

  # ── Determine Environment ────────────────────────────────────────────────
  determine-env:
    name: Determine environment
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - id: set-env
        run: |
          # inputs.environment works for both workflow_call and workflow_dispatch
          ENV="${{ inputs.environment }}"
          if [ -z "$ENV" ]; then
            ENV="dev"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT

  # ── Get IaC Outputs ──────────────────────────────────────────────────────
  get-iac-outputs:
    name: Retrieve tunnel secret from IaC
    runs-on: ubuntu-latest
    needs: determine-env
    environment:
      name: ${{ needs.determine-env.outputs.environment }}
    outputs:
      tunnel_secret: ${{ steps.outputs.outputs.tunnel_secret }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.x"

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Get tunnel secret (IaC output)
        id: outputs
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
        run: |
          tofu init \
            -backend-config="bucket=familyshield-tfstate" \
            -backend-config="key=${{ needs.determine-env.outputs.environment }}/terraform.tfstate" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
            -backend-config="region=ca-toronto-1" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="use_path_style=true" \
            -reconfigure

          TUNNEL_SECRET=$(tofu output -raw tunnel_secret 2>/dev/null || echo "")
          if [ -z "$TUNNEL_SECRET" ]; then
            echo "❌ Failed to get tunnel_secret from IaC"
            exit 1
          fi
          echo "tunnel_secret=$TUNNEL_SECRET" >> $GITHUB_OUTPUT
          echo "✅ tunnel_secret retrieved"

  # ── Setup or Cleanup Cloudflare ──────────────────────────────────────────
  cloudflare-deploy:
    name: "Cloudflare: ${{ github.event.inputs.action || 'Setup' }}"
    runs-on: ubuntu-latest
    needs: [determine-env, get-iac-outputs]
    environment:
      name: ${{ needs.determine-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine action
        id: action
        run: |
          # inputs.action works for both workflow_call and workflow_dispatch
          ACTION="${{ inputs.action }}"
          if [ -z "$ACTION" ]; then
            ACTION="setup"
          fi
          echo "action=$ACTION" >> $GITHUB_OUTPUT

      - name: Setup Cloudflare
        if: steps.action.outputs.action == 'setup'
        run: |
          bash scripts/cloudflare-api.sh setup \
            "${{ needs.determine-env.outputs.environment }}" \
            "${{ needs.get-iac-outputs.outputs.tunnel_secret }}" \
            "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Cleanup Cloudflare
        if: steps.action.outputs.action == 'cleanup'
        run: |
          bash scripts/cloudflare-api.sh cleanup \
            "${{ needs.determine-env.outputs.environment }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Summary
        run: |
          ENV="${{ needs.determine-env.outputs.environment }}"
          echo "## 🌐 Cloudflare — $ENV" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** ${{ steps.action.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tunnel: created" >> $GITHUB_STEP_SUMMARY
          echo "- DNS records: 8 CNAME (HTTP services + SSH)" >> $GITHUB_STEP_SUMMARY
          echo "- Access apps: AdGuard + Grafana" >> $GITHUB_STEP_SUMMARY
          echo "- SSH hostname: ssh.familyshield-${ENV}.everythingcloud.ca" >> $GITHUB_STEP_SUMMARY

  # ── Redeploy Apps via Tunnel SSH (zero public IP exposure) ────────────────
  redeploy-via-tunnel:
    name: "Redeploy apps via tunnel SSH"
    runs-on: ubuntu-latest
    needs: [determine-env, cloudflare-deploy]
    if: needs.cloudflare-deploy.result == 'success'
    environment:
      name: ${{ needs.determine-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait for tunnel SSH to become available
        shell: bash
        env:
          ENVIRONMENT: ${{ needs.determine-env.outputs.environment }}
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield

          TUNNEL_HOST="ssh.familyshield-${ENVIRONMENT}.everythingcloud.ca"
          echo "🔍 Waiting for tunnel SSH: $TUNNEL_HOST"

          for attempt in {1..30}; do
            if timeout 10 ssh -i ~/.ssh/familyshield \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=8 \
              ubuntu@"$TUNNEL_HOST" "true" 2>/dev/null; then
              echo "✅ Tunnel SSH responding (attempt $attempt)"
              break
            fi
            if [ $attempt -eq 30 ]; then
              echo "❌ Tunnel SSH not available after 5 minutes"
              exit 1
            fi
            echo "   ⏳ Attempt $attempt/30 — waiting 10s..."
            sleep 10
          done

      - name: Health check via tunnel SSH
        shell: bash
        env:
          ENVIRONMENT: ${{ needs.determine-env.outputs.environment }}
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          set -e

          TUNNEL_HOST="ssh.familyshield-${ENVIRONMENT}.everythingcloud.ca"

          echo "🔐 Verifying instance health via tunnel (zero public IP exposure)"
          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=10 \
            ubuntu@"$TUNNEL_HOST" \
            "uname -a && echo '✅ OS: OK' && df -h / | tail -1 && echo '✅ Disk: OK' && systemctl is-system-running 2>/dev/null && echo '✅ systemd: OK'"

          echo ""
          echo "✅ Health check passed — SSH connection via Cloudflare Tunnel (public IP not used)"

      - name: Ensure app containers are running via tunnel SSH
        shell: bash
        env:
          ENVIRONMENT: ${{ needs.determine-env.outputs.environment }}
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -e

          TUNNEL_HOST="ssh.familyshield-${ENVIRONMENT}.everythingcloud.ca"
          REPO_LOWER=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')

          echo "📦 Ensuring app containers are current (via tunnel SSH)"
          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=10 \
            ubuntu@"$TUNNEL_HOST" \
            "cd /opt/familyshield && \
             echo '$GHCR_TOKEN' | docker login ghcr.io -u github --password-stdin 2>/dev/null && \
             docker compose pull api portal 2>/dev/null || true && \
             docker compose up -d --no-deps --remove-orphans api portal && \
             sleep 8 && \
             docker compose ps && \
             echo '✅ App containers confirmed running'"

          echo ""
          echo "✅ App deployment complete — all SSH via Cloudflare Tunnel"

      - name: Summary
        run: |
          ENV="${{ needs.determine-env.outputs.environment }}"
          echo "## 🔐 Tunnel SSH — $ENV" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ All app management via tunnel" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- SSH host: \`ssh.familyshield-${ENV}.everythingcloud.ca\`" >> $GITHUB_STEP_SUMMARY
          echo "- Public IP SSH: ❌ Not used" >> $GITHUB_STEP_SUMMARY
          echo "- Tunnel SSH: ✅ Active" >> $GITHUB_STEP_SUMMARY
