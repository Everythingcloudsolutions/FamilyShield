# .github/workflows/deploy-cloudflare.yml
# Manages Cloudflare resources (tunnel, DNS, access apps) via API
# Called after successful IaC deployment to set up public routing
# Can also be called manually for troubleshooting or updates
name: Deploy → Cloudflare

on:
  workflow_run:
    workflows: ["Deploy → Dev"]
    types: [completed]
    branches: [main, development]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment: dev | staging | prod"
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: "Action to perform: setup | cleanup"
        required: true
        type: choice
        options: [setup, cleanup]
        default: setup

permissions:
  contents: read
  id-token: write

jobs:
  # ── Validate Previous Workflow ───────────────────────────────────────────
  gate:
    name: Check IaC deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "✅ IaC deployment passed or manual trigger — proceeding with Cloudflare setup"

  # ── Determine Environment ────────────────────────────────────────────────
  determine-env:
    name: Determine environment
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  # ── Get IaC Outputs ──────────────────────────────────────────────────────
  get-iac-outputs:
    name: Retrieve tunnel secret from IaC
    runs-on: ubuntu-latest
    needs: determine-env
    environment:
      name: ${{ needs.determine-env.outputs.environment }}
    outputs:
      tunnel_secret: ${{ steps.outputs.outputs.tunnel_secret }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.x"

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid:    ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint:  ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key:  ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Get tunnel secret (IaC output)
        id: outputs
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE:         ${{ secrets.OCI_NAMESPACE }}
        run: |
          tofu init \
            -backend-config="bucket=familyshield-tfstate" \
            -backend-config="key=${{ needs.determine-env.outputs.environment }}/terraform.tfstate" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
            -backend-config="region=ca-toronto-1" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="use_path_style=true" \
            -reconfigure

          TUNNEL_SECRET=$(tofu output -raw tunnel_secret 2>/dev/null || echo "")
          if [ -z "$TUNNEL_SECRET" ]; then
            echo "❌ Failed to get tunnel_secret from IaC"
            exit 1
          fi
          echo "tunnel_secret=$TUNNEL_SECRET" >> $GITHUB_OUTPUT
          echo "✅ tunnel_secret retrieved"

  # ── Setup or Cleanup Cloudflare ──────────────────────────────────────────
  cloudflare-deploy:
    name: "Cloudflare: ${{ github.event.inputs.action || 'Setup' }}"
    runs-on: ubuntu-latest
    needs: [determine-env, get-iac-outputs]
    environment:
      name: ${{ needs.determine-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          else
            echo "action=setup" >> $GITHUB_OUTPUT
          fi

      - name: Setup Cloudflare
        if: steps.action.outputs.action == 'setup'
        run: |
          bash scripts/cloudflare-api.sh setup \
            "${{ needs.determine-env.outputs.environment }}" \
            "${{ needs.get-iac-outputs.outputs.tunnel_secret }}" \
            "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
        env:
          CLOUDFLARE_API_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID:     ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Cleanup Cloudflare
        if: steps.action.outputs.action == 'cleanup'
        run: |
          bash scripts/cloudflare-api.sh cleanup \
            "${{ needs.determine-env.outputs.environment }}"
        env:
          CLOUDFLARE_API_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID:     ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Summary
        run: |
          echo "## 🌐 Cloudflare — ${{ needs.determine-env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** ${{ steps.action.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tunnel: created" >> $GITHUB_STEP_SUMMARY
          echo "- DNS records: 4 CNAME" >> $GITHUB_STEP_SUMMARY
          echo "- Access apps: AdGuard + Grafana" >> $GITHUB_STEP_SUMMARY
