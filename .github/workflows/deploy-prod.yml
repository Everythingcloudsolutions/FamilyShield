# .github/workflows/deploy-prod.yml
# Triggered on apps/** changes to main branch, or manually,
# or after infra-prod.yml completes (to restart containers on fresh VM).
#
# Uses Cloudflare Tunnel SSH exclusively — never touches public IP.
# Works regardless of NSG state (0.0.0.0/0 or tightened to admin IP).
#
# Images are PROMOTED from the dev SHA tag — not rebuilt.
# Mixed commit handling: wait-for-infra polls for infra-prod.yml if both trigger.
name: "FamilyShield — Deploy Prod"

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "scripts/**"
      - ".github/workflows/deploy-prod.yml"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production app deployment"
        required: true
  workflow_run:
    workflows: ["FamilyShield — Infrastructure Prod"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write
  packages: write
  actions: read # Needed to poll workflow runs for wait-for-infra

# Never cancel prod deploys mid-flight
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  safety-check:
    name: "Pre-deploy safety check"
    runs-on: ubuntu-latest
    # Only check on direct push/dispatch — workflow_run doesn't need this gate
    if: github.event_name != 'workflow_run'
    steps:
      - name: Confirm production deploy intent
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "❌ You must type DEPLOY in the confirm field to proceed"
            exit 1
          fi
          echo "✅ Production app deploy confirmed by ${{ github.actor }} (trigger: ${{ github.event_name }})"

  wait-for-infra:
    name: "Wait for infra-prod if running"
    runs-on: ubuntu-latest
    needs: safety-check
    if: |
      always() &&
      (needs.safety-check.result == 'success' || needs.safety-check.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      infra_conclusion: ${{ steps.poll.outputs.infra_conclusion }}
    steps:
      - name: Poll for running infra-prod workflow
        id: poll
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          echo "Checking if infra-prod.yml is running for this commit..."
          MAX_WAIT=600
          INTERVAL=30
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RUN=$(gh api \
              "repos/$REPO/actions/workflows/infra-prod.yml/runs?branch=main&per_page=5" \
              --jq '.workflow_runs[] | select(.head_sha == env.SHA) | {status: .status, conclusion: .conclusion}' \
              2>/dev/null | head -1 || echo "")

            if [ -z "$RUN" ]; then
              echo "ℹ️  No infra-prod run found for this commit — proceeding"
              echo "infra_conclusion=none" >> $GITHUB_OUTPUT
              exit 0
            fi

            STATUS=$(echo "$RUN" | jq -r '.status')
            CONCLUSION=$(echo "$RUN" | jq -r '.conclusion')

            if [ "$STATUS" = "completed" ]; then
              echo "✅ infra-prod completed with conclusion: $CONCLUSION"
              echo "infra_conclusion=$CONCLUSION" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "   infra-prod status: $STATUS — waiting ${INTERVAL}s... (${ELAPSED}s elapsed)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "⚠️  Timed out waiting for infra-prod — proceeding anyway"
          echo "infra_conclusion=timeout" >> $GITHUB_OUTPUT

  verify-tunnel:
    name: "Verify Cloudflare tunnel SSH is reachable"
    runs-on: ubuntu-latest
    needs: wait-for-infra
    if: |
      always() &&
      (needs.wait-for-infra.result == 'success' || needs.wait-for-infra.result == 'skipped')
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared version

      - name: Portal health check via tunnel
        run: |
          PORTAL_URL="https://familyshield.everythingcloud.ca"
          for attempt in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PORTAL_URL" || echo "000")
            if [[ "$STATUS" =~ ^(200|302|403)$ ]]; then
              echo "✅ Tunnel active — portal reachable (HTTP $STATUS)"
              exit 0
            fi
            echo "   Attempt $attempt/6 — HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "❌ Tunnel not reachable — run infra-prod.yml first, then retry"
          exit 1

  promote-images:
    name: "Promote images dev → prod"
    runs-on: ubuntu-latest
    needs: verify-tunnel
    environment:
      name: prod
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote images to prod tag
        run: |
          DEPLOY_SHA="${{ github.sha }}"
          for app in api portal; do
            # Prefer SHA-tagged image (built from same commit); fall back to :dev
            docker pull ghcr.io/everythingcloudsolutions/familyshield-$app:$DEPLOY_SHA 2>/dev/null || \
              docker pull ghcr.io/everythingcloudsolutions/familyshield-$app:dev

            docker tag ghcr.io/everythingcloudsolutions/familyshield-$app:$DEPLOY_SHA \
                       ghcr.io/everythingcloudsolutions/familyshield-$app:prod 2>/dev/null || \
              docker tag ghcr.io/everythingcloudsolutions/familyshield-$app:dev \
                         ghcr.io/everythingcloudsolutions/familyshield-$app:prod

            docker tag ghcr.io/everythingcloudsolutions/familyshield-$app:prod \
                       ghcr.io/everythingcloudsolutions/familyshield-$app:latest

            docker push ghcr.io/everythingcloudsolutions/familyshield-$app:prod
            docker push ghcr.io/everythingcloudsolutions/familyshield-$app:latest
            echo "✅ Promoted $app to :prod and :latest"
          done

  deploy-app-prod:
    name: "App deploy → prod VM (via Cloudflare tunnel SSH)"
    runs-on: ubuntu-latest
    needs: promote-images
    environment:
      name: prod
      url: https://familyshield.everythingcloud.ca
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Prepare SSH key
        env:
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield

      - name: Sync runtime assets to VM
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          SSH_HOST="ssh-prod.everythingcloud.ca"

          tar -czf /tmp/familyshield-runtime-assets.tgz apps/mitm apps/platform-config

          scp -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand="cloudflared access ssh --hostname ${SSH_HOST}" \
            /tmp/familyshield-runtime-assets.tgz \
            ubuntu@"${SSH_HOST}":/tmp/familyshield-runtime-assets.tgz

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand="cloudflared access ssh --hostname ${SSH_HOST}" \
            ubuntu@"${SSH_HOST}" \
            "mkdir -p /opt/familyshield && tar -xzf /tmp/familyshield-runtime-assets.tgz -C /opt/familyshield"

          echo "✅ Runtime assets synced"

      - name: Deploy containers via tunnel SSH
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          SSH_HOST="ssh-prod.everythingcloud.ca"

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand="cloudflared access ssh --hostname ${SSH_HOST}" \
            ubuntu@"${SSH_HOST}" bash -s <<ENDSSH
          set -euo pipefail
          cd /opt/familyshield

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          docker compose pull api portal
          docker compose up -d --no-deps --remove-orphans api portal

          sleep 10
          docker compose ps
          echo "✅ Prod deploy complete"
          ENDSSH

  smoke-test:
    name: "Smoke test — prod"
    runs-on: ubuntu-latest
    needs: deploy-app-prod
    steps:
      - name: Check portal and API health
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID_PROD }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET_PROD }}
        run: |
          BASE_URL="https://familyshield.everythingcloud.ca"

          CF_HEADERS=()
          if [ -n "$CF_ACCESS_CLIENT_ID" ] && [ -n "$CF_ACCESS_CLIENT_SECRET" ]; then
            CF_HEADERS=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET")
          fi

          echo "Checking portal..."
          PASSED=false
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${CF_HEADERS[@]}" "$BASE_URL" || echo "000")
            if [[ "$STATUS" =~ ^(200|302|403)$ ]]; then
              echo "✅ Production portal healthy (HTTP $STATUS)"
              PASSED=true
              break
            elif [[ "$STATUS" =~ ^5 ]]; then
              echo "❌ Server error $STATUS"
              exit 1
            fi
            echo "Attempt $i: $STATUS — waiting 30s..."
            sleep 30
          done

          if [ "$PASSED" = "false" ]; then
            echo "❌ Production portal not responding after 10 attempts (last: $STATUS)"
            exit 1
          fi

          echo "Checking API health..."
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${CF_HEADERS[@]}" "$BASE_URL/api/health" || echo "000")
          if [[ "$API_STATUS" =~ ^(200|403)$ ]]; then
            echo "✅ API reachable (HTTP $API_STATUS)"
          else
            echo "❌ API health check failed (HTTP $API_STATUS)"
            exit 1
          fi

          echo "✅ Production smoke tests passed"

  create-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: smoke-test
    permissions:
      contents: write
    steps:
      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "prod-${{ github.run_number }}"
          release_name: "Production Deploy #${{ github.run_number }}"
          body: |
            ## Production Deployment

            - **SHA:** ${{ github.sha }}
            - **Deployed by:** ${{ github.actor }}
            - **Environment:** prod (ca-toronto-1)
            - **URL:** https://familyshield.everythingcloud.ca
          draft: false
          prerelease: false
