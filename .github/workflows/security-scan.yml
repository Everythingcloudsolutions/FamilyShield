# .github/workflows/security-scan.yml
# ─────────────────────────────────────────────────────────────────────────────
# FamilyShield Security Gate
#
# Runs on every PR (development|main) and on code-changing pushes to development or main.
# Path filter excludes bot commits (README.md, docs/) to avoid spurious runs.
#
# Gate behaviour:
#   - PASS  — zero unfixed, non-excepted vulnerabilities
#   - WARN  — excepted vulnerability within 14 days of expiry (strict mode)
#   - FAIL  — unfixed non-excepted vulnerability, OR expired exception
#
# Exceptions are managed in scripts/security-exceptions.json.
# ─────────────────────────────────────────────────────────────────────────────
name: Security Gate

on:
    pull_request:
        branches: [ development, main ]
        types: [ opened, synchronize, reopened ]
    push:
        branches: [ development, main ]
        paths:
            - "apps/**"
            - "iac/**"
            - "scripts/**"
            - ".github/workflows/security-scan.yml"
    workflow_dispatch:
        inputs:
            strict:
                description: "Fail on exceptions expiring within 14 days"
                required: false
                default: false
                type: boolean

permissions:
    contents: read
    pull-requests: write # needed to post scan summary as PR comment

jobs:
    # ── npm audit — portal ──────────────────────────────────────────────────────
    audit-portal:
        name: "Audit portal (npm)"
        runs-on: ubuntu-latest
        outputs:
            result: ${{ steps.gate.outputs.result }}
            summary: ${{ steps.gate.outputs.summary }}
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: apps/portal/package-lock.json

            - name: Install portal dependencies
              run: npm ci --prefer-offline
              working-directory: apps/portal

            - name: Run npm audit (JSON)
              id: audit
              run: |
                  # Exit 1 when vulns found — capture output regardless
                  npm audit --json > /tmp/portal-audit.json 2>/dev/null || true
                  total=$(jq '.metadata.vulnerabilities.total // 0' /tmp/portal-audit.json)
                  echo "total=${total}" >> "$GITHUB_OUTPUT"
              working-directory: apps/portal

            - name: Evaluate against exception list
              id: gate
              run: |
                  set +e  # allow script to report failures via exit code
                  STRICT_FLAG=""
                  [[ "${{ github.event.inputs.strict }}" == "true" ]] && STRICT_FLAG="--strict"
                  bash scripts/security-gate.sh $STRICT_FLAG 2>&1 | tee /tmp/security-gate-portal.txt
                  EXIT_CODE=$?
                  {
                    echo "result=$([ $EXIT_CODE -eq 0 ] && echo 'pass' || echo 'fail')"
                    echo "summary<<EOF"
                    cat /tmp/security-gate-portal.txt
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"
                  exit $EXIT_CODE

            - name: Upload audit report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: portal-audit-report
                  path: /tmp/portal-audit.json
                  retention-days: 30

    # ── npm audit — api ─────────────────────────────────────────────────────────
    audit-api:
        name: "Audit API (npm)"
        runs-on: ubuntu-latest
        outputs:
            result: ${{ steps.gate.outputs.result }}
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: apps/api/package-lock.json

            - name: Install API dependencies
              run: npm ci --prefer-offline
              working-directory: apps/api

            - name: Run npm audit (JSON)
              run: npm audit --json > /tmp/api-audit.json 2>/dev/null || true
              working-directory: apps/api

            - name: Evaluate against exception list
              id: gate
              run: |
                  set +e
                  STRICT_FLAG=""
                  [[ "${{ github.event.inputs.strict }}" == "true" ]] && STRICT_FLAG="--strict"
                  bash scripts/security-gate.sh $STRICT_FLAG 2>&1 | tee /tmp/security-gate-api.txt
                  EXIT_CODE=$?
                  echo "result=$([ $EXIT_CODE -eq 0 ] && echo 'pass' || echo 'fail')" >> "$GITHUB_OUTPUT"
                  exit $EXIT_CODE

            - name: Upload audit report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: api-audit-report
                  path: /tmp/api-audit.json
                  retention-days: 30

    # ── pip-audit — mitm ────────────────────────────────────────────────────────
    audit-mitm:
        name: "Audit mitm (pip)"
        runs-on: ubuntu-latest
        outputs:
            result: ${{ steps.gate.outputs.result }}
        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install pip-audit
              run: pip install pip-audit --quiet

            - name: Run pip-audit (JSON)
              run: |
                  python3 -m pip_audit \
                    -r apps/mitm/requirements.txt \
                    --format json \
                    --progress-spinner off \
                    > /tmp/mitm-audit.json 2>/dev/null || true

            - name: Evaluate against exception list
              id: gate
              run: |
                  set +e
                  STRICT_FLAG=""
                  [[ "${{ github.event.inputs.strict }}" == "true" ]] && STRICT_FLAG="--strict"
                  bash scripts/security-gate.sh $STRICT_FLAG 2>&1 | tee /tmp/security-gate-mitm.txt
                  EXIT_CODE=$?
                  echo "result=$([ $EXIT_CODE -eq 0 ] && echo 'pass' || echo 'fail')" >> "$GITHUB_OUTPUT"
                  exit $EXIT_CODE

            - name: Upload audit report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: mitm-audit-report
                  path: /tmp/mitm-audit.json
                  retention-days: 30

    # ── Exception expiry check ──────────────────────────────────────────────────
    check-exception-expiry:
        name: "Check exception expiry dates"
        runs-on: ubuntu-latest
        outputs:
            has_expiring: ${{ steps.expiry.outputs.has_expiring }}
            expiry_report: ${{ steps.expiry.outputs.report }}
        steps:
            - uses: actions/checkout@v4

            - name: Check exception file expiry
              id: expiry
              run: |
                  TODAY=$(date -u +%Y-%m-%d)
                  HAS_EXPIRING=false
                  REPORT=""

                  count=$(jq '.exceptions | length' scripts/security-exceptions.json)
                  if [[ "$count" -eq 0 ]]; then
                    echo "has_expiring=false" >> "$GITHUB_OUTPUT"
                    echo "report=No active exceptions." >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  while IFS= read -r row; do
                    id=$(echo "$row" | jq -r '.id')
                    expires=$(echo "$row" | jq -r '.expires')
                    pkg=$(echo "$row" | jq -r '.package')
                    ws=$(echo "$row" | jq -r '.workspace')
                    owner=$(echo "$row" | jq -r '.owner')

                    days_left=$(python3 -c "from datetime import date; t=date.fromisoformat('${expires}'); d=date.fromisoformat('${TODAY}'); print((t-d).days)")

                    if [[ "$days_left" -lt 0 ]]; then
                      REPORT="${REPORT}\n❌ **${id}** (${pkg} in \`${ws}\`) — **EXPIRED** ${days_left#-} days ago — owner: @${owner}"
                      HAS_EXPIRING=true
                    elif [[ "$days_left" -le 14 ]]; then
                      REPORT="${REPORT}\n⚠️ **${id}** (${pkg} in \`${ws}\`) — expires in **${days_left} days** (${expires}) — owner: @${owner}"
                      HAS_EXPIRING=true
                    else
                      REPORT="${REPORT}\n✅ **${id}** (${pkg} in \`${ws}\`) — valid until ${expires} (${days_left} days)"
                    fi
                  done < <(jq -c '.exceptions[]' scripts/security-exceptions.json)

                  echo "has_expiring=${HAS_EXPIRING}" >> "$GITHUB_OUTPUT"
                  {
                    echo "report<<EOF"
                    echo -e "$REPORT"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

    # ── PR comment summary ──────────────────────────────────────────────────────
    post-pr-summary:
        name: "Post PR summary"
        runs-on: ubuntu-latest
        needs: [ audit-portal, audit-api, audit-mitm, check-exception-expiry ]
        if: github.event_name == 'pull_request' && always()
        permissions:
            pull-requests: write
        steps:
            - uses: actions/checkout@v4

            - name: Build and post comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const portalResult = ${{ toJSON(needs.audit-portal.outputs.result) }};
                      const apiResult    = ${{ toJSON(needs.audit-api.outputs.result) }};
                      const mitmResult   = ${{ toJSON(needs.audit-mitm.outputs.result) }};
                      const expiryReport = ${{ toJSON(needs.check-exception-expiry.outputs.expiry_report) }};
                      const hasExpiring  = ${{ toJSON(needs.check-exception-expiry.outputs.has_expiring) }} === 'true';

                      const icon = r => r === 'pass' ? '\u2705' : r === '' ? '\u23ed' : '\u274c';

                      const body = [
                        '## \ud83d\udd12 Security Gate Summary',
                        '',
                        '| Workspace | Result |',
                        '|-----------|--------|',
                        '| `apps/portal` (npm) | ' + icon(portalResult) + ' ' + (portalResult || 'skipped') + ' |',
                        '| `apps/api` (npm)    | ' + icon(apiResult) + ' ' + (apiResult || 'skipped') + ' |',
                        '| `apps/mitm` (pip)   | ' + icon(mitmResult) + ' ' + (mitmResult || 'skipped') + ' |',
                        '',
                        '### Exception Status',
                        expiryReport || '_No active exceptions._',
                        '',
                        hasExpiring
                          ? '> \u26a0\ufe0f **Action required:** One or more exceptions are expiring or expired. Update `scripts/security-exceptions.json`.'
                          : '> All exceptions are within their validity window.',
                        '',
                        '_Run ID: [' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')_'
                      ].join('\n');

                      // Find existing bot comment and update, or create new
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });

                      const existing = comments.find(c =>
                        c.user.type === 'Bot' && c.body.includes('🔒 Security Gate Summary')
                      );

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }
