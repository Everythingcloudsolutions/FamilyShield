name: Scheduled Health Check

on:
  schedule:
    # Run every 30 minutes
   # - cron: "*/30 * * * *"
  # Allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  health-check:
    name: Check Service Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Run health checks
        id: health-check
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          chmod +x scripts/check-health.sh
          bash scripts/check-health.sh all | tee /tmp/health-report.txt

      - name: Update README.md
        run: |
          python3 <<'EOF'
          import re
          from datetime import datetime

          README_PATH = 'README.md'
          REPORT_PATH = '/tmp/health-report.txt'

          with open(README_PATH, 'r', encoding='utf-8') as f:
            content = f.read()

          with open(REPORT_PATH, 'r', encoding='utf-8') as f:
            report = f.read()

          def extract_env_table(text: str, env: str) -> str:
            pattern = rf"## Environment: `{env}`\n\n(\| Service \| Status \| Response Time \|\n\|[-| ]+\n(?:\|.*\n)+)"
            m = re.search(pattern, text)
            if m:
              return m.group(1).strip()
            return "| Service | Status | Response Time |\n|---------|--------|----------------|\n| (no data) | ⚠️ unknown | n/a |"

          dev_table = extract_env_table(report, 'dev')
          prod_table = extract_env_table(report, 'prod')

          timestamp = datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')

          health_section = "\n".join([
            "## 🏥 Health Status",
            "",
            f"**Last checked:** {timestamp}",
            "",
            "### Dev Environment",
            "",
            "<!-- HEALTH_TABLE_DEV_START -->",
            dev_table,
            "<!-- HEALTH_TABLE_DEV_END -->",
            "",
            "### Prod Environment",
            "",
            "<!-- HEALTH_TABLE_PROD_START -->",
            prod_table,
            "<!-- HEALTH_TABLE_PROD_END -->",
            "",
            "---",
          ])

          if '## 🏥 Health Status' in content:
            pattern = r'## 🏥 Health Status[\s\S]*?(?=\n## What Is FamilyShield\?)'
            content = re.sub(pattern, health_section + "\n", content)
          else:
            insert_before = '\n## What Is FamilyShield?'
            idx = content.find(insert_before)
            if idx == -1:
              content = content.rstrip() + "\n\n" + health_section + "\n"
            else:
              content = content[:idx] + "\n" + health_section + "\n" + content[idx + 1:]

          with open(README_PATH, 'w', encoding='utf-8') as f:
            f.write(content)
          EOF

      - name: Validate README health section structure
        run: |
          python3 <<'EOF'
          import re
          import sys

          with open('README.md', 'r', encoding='utf-8') as f:
            content = f.read()

          section_count = len(re.findall(r'^## 🏥 Health Status\b', content, flags=re.MULTILINE))
          if section_count != 1:
            print(f"ERROR: Expected exactly 1 health section, found {section_count}")
            sys.exit(1)

          checks = {
            '### Dev Environment': content.count('### Dev Environment'),
            '### Prod Environment': content.count('### Prod Environment'),
            '<!-- HEALTH_TABLE_DEV_START -->': content.count('<!-- HEALTH_TABLE_DEV_START -->'),
            '<!-- HEALTH_TABLE_DEV_END -->': content.count('<!-- HEALTH_TABLE_DEV_END -->'),
            '<!-- HEALTH_TABLE_PROD_START -->': content.count('<!-- HEALTH_TABLE_PROD_START -->'),
            '<!-- HEALTH_TABLE_PROD_END -->': content.count('<!-- HEALTH_TABLE_PROD_END -->'),
          }

          bad = {k: v for k, v in checks.items() if v != 1}
          if bad:
            print('ERROR: README health markers/headings are malformed:')
            for k, v in bad.items():
              print(f"  - {k}: found {v}, expected 1")
            sys.exit(1)

          dev_start = content.index('<!-- HEALTH_TABLE_DEV_START -->')
          dev_end = content.index('<!-- HEALTH_TABLE_DEV_END -->')
          prod_start = content.index('<!-- HEALTH_TABLE_PROD_START -->')
          prod_end = content.index('<!-- HEALTH_TABLE_PROD_END -->')

          if not (dev_start < dev_end < prod_start < prod_end):
            print('ERROR: README health table marker order is invalid')
            sys.exit(1)

          print('README health section structure is valid')
          EOF

      - name: Commit and push
        run: |
          git config user.name "FamilyShield Health Check Bot"
          git config user.email "bot@everythingcloud.ca"
          git add README.md

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update health status — $(date -u +%Y-%m-%d\ %H:%M:%SZ)"
            git push
          fi
