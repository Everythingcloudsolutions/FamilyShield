name: Scheduled Health Check

on:
  schedule:
    # Run every 30 minutes
    - cron: "*/30 * * * *"
  # Allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  health-check:
    name: Check Service Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Run health checks
        id: health-check
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          chmod +x scripts/check-health.sh
          bash scripts/check-health.sh all | tee /tmp/health-report.txt

      - name: Parse health report
        id: parse
        run: |
          # Count healthy services
          DEV_HEALTHY=$(grep -c "✅" /tmp/health-report.txt || echo "0")
          DEV_TOTAL=$(grep -E "^\| [A-Za-z]" /tmp/health-report.txt | head -15 | wc -l)

          echo "dev_healthy=$DEV_HEALTHY" >> "$GITHUB_OUTPUT"
          echo "dev_total=$DEV_TOTAL" >> "$GITHUB_OUTPUT"

      - name: Update README.md
        run: |
          # Check if health status section exists
          if grep -q "## 🏥 Health Status" README.md; then
            # Replace existing health section
          python3 <<'EOF'
          import re
          from datetime import datetime

          with open('README.md', 'r', encoding='utf-8') as f:
            content = f.read()

          with open('/tmp/health-report.txt', 'r', encoding='utf-8') as f:
            health_report = f.read()

          timestamp = datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')
          health_section = f"""## 🏥 Health Status

          **Last checked:** {timestamp}

          {health_report}

          ---
          """

          pattern = r'## 🏥 Health Status.*?(?=\n## |\Z)'
          content = re.sub(pattern, health_section.strip(), content, flags=re.DOTALL)

          with open('README.md', 'w', encoding='utf-8') as f:
            f.write(content)
          EOF
          else
            # Insert health section after title/intro (before first ##)
          python3 <<'EOF'
          from datetime import datetime

          with open('README.md', 'r', encoding='utf-8') as f:
            lines = f.readlines()

          with open('/tmp/health-report.txt', 'r', encoding='utf-8') as f:
            health_report = f.read()

          timestamp = datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')
          health_section = f"""## 🏥 Health Status

          **Last checked:** {timestamp}

          {health_report}

          ---

          """

          insert_pos = 0
          for i, line in enumerate(lines):
            if line.startswith('## ') and i > 0:
              insert_pos = i
              break

          if insert_pos == 0:
            insert_pos = len(lines)

          lines.insert(insert_pos, health_section)

          with open('README.md', 'w', encoding='utf-8') as f:
            f.writelines(lines)
          EOF
          fi

      - name: Commit and push
        run: |
          git config user.name "FamilyShield Health Check Bot"
          git config user.email "bot@everythingcloud.ca"
          git add README.md

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update health status — $(date -u +%Y-%m-%d\ %H:%M:%SZ)"
            git push
          fi
