name: Health Check

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  health-check:
    name: Check Service Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: development

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Run health checks
        id: health-check
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          chmod +x scripts/check-health.sh
          bash scripts/check-health.sh all | tee /tmp/health-report.txt

      - name: Update docs/status/health.md
        run: |
          python3 <<'EOF'
          import re
          from datetime import datetime

          HEALTH_PATH = 'docs/status/health.md'
          REPORT_PATH = '/tmp/health-report.txt'

          with open(HEALTH_PATH, 'r', encoding='utf-8') as f:
            content = f.read()

          with open(REPORT_PATH, 'r', encoding='utf-8') as f:
            report = f.read()

          def extract_env_table(text: str, env: str) -> str:
            pattern = rf"## Environment: `{env}`\n\n(\| Service \| Status \| Response Time \|\n\|[-| ]+\n(?:\|.*\n)+)"
            m = re.search(pattern, text)
            if m:
              return m.group(1).strip()
            return "| Service | Status | Response Time |\n|---------|--------|----------------|\n| (no data) | ⚠️ unknown | n/a |"

          timestamp = datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')

          # Update Dev table and timestamp
          dev_table = extract_env_table(report, 'dev')
          content = re.sub(
            r'(## Dev Environment\n\n\*\*Last checked:\*\* ).*',
            rf'\g<1>{timestamp}',
            content
          )
          content = re.sub(
            r'<!-- HEALTH_TABLE_DEV_START -->.*?<!-- HEALTH_TABLE_DEV_END -->',
            f'<!-- HEALTH_TABLE_DEV_START -->\n{dev_table}\n<!-- HEALTH_TABLE_DEV_END -->',
            content, flags=re.DOTALL
          )

          # Update Prod table and timestamp
          prod_table = extract_env_table(report, 'prod')
          content = re.sub(
            r'(## Prod Environment\n\n\*\*Last checked:\*\* ).*',
            rf'\g<1>{timestamp}',
            content
          )
          content = re.sub(
            r'<!-- HEALTH_TABLE_PROD_START -->.*?<!-- HEALTH_TABLE_PROD_END -->',
            f'<!-- HEALTH_TABLE_PROD_START -->\n{prod_table}\n<!-- HEALTH_TABLE_PROD_END -->',
            content, flags=re.DOTALL
          )

          with open(HEALTH_PATH, 'w', encoding='utf-8') as f:
            f.write(content)

          print(f'Updated {HEALTH_PATH} at {timestamp}')
          EOF

      - name: Commit and push
        run: |
          git config user.name "FamilyShield Health Check Bot"
          git config user.email "bot@everythingcloud.ca"
          git add docs/status/health.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update health status — $(date -u +%Y-%m-%d\ %H:%M:%SZ)"
            git push
          fi
