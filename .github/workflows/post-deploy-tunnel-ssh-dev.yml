# .github/workflows/post-deploy-tunnel-ssh-dev.yml
# Runs AFTER deploy-cloudflare.yml completes (tunnel + DNS ready)
# Verifies SSH access via Cloudflare Tunnel (zero public IP exposure)
# Demonstrates that all future SSH to dev VM goes through secure tunnel

name: "Post-Deploy → Verify Tunnel SSH (dev)"

on:
  workflow_run:
    workflows: ["Deploy → Cloudflare"]
    types: [completed]
    branches: [main, development]

permissions:
  contents: read

jobs:
  verify-tunnel-ssh:
    name: "Verify SSH via tunnel"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Verify SSH Access via Cloudflare Tunnel
        shell: bash
        env:
          ENVIRONMENT: dev
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          set -e

          # Save SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield

          TUNNEL_HOST="ssh.familyshield-${ENVIRONMENT}.everythingcloud.ca"

          echo "🔐 Testing SSH access via Cloudflare Tunnel (post-install verification)"
          echo "   Host: $TUNNEL_HOST"
          echo ""

          # 1. Verify tunnel-based SSH works
          echo "   Testing tunnel SSH connectivity..."
          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=10 \
            ubuntu@"$TUNNEL_HOST" \
            "uname -a && echo '✅ SSH via tunnel: OK' && hostname && echo '✅ All future SSH will route through Cloudflare Tunnel (zero public IP exposure)'"

          echo ""
          echo "✅ Tunnel SSH verification complete"

      - name: Summary
        run: |
          echo "## 🔐 Tunnel SSH Verification — dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ SSH accessible via tunnel" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Public IP SSH: ❌ Blocked" >> $GITHUB_STEP_SUMMARY
          echo "- Tunnel SSH: ✅ Working" >> $GITHUB_STEP_SUMMARY
          echo "- Route: ssh.familyshield-dev.everythingcloud.ca:22 → localhost:22 on VM" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All SSH connections now route through Cloudflare Tunnel." >> $GITHUB_STEP_SUMMARY
