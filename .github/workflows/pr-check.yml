# .github/workflows/pr-check.yml
# Runs on every Pull Request targeting development or main.
# Jobs are path-filtered: IaC lint/plan only runs when iac/** changed;
# app lint only runs when apps/** changed. Security scan always runs.
name: PR Check

on:
  pull_request:
    branches: [development, main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write # needed to post plan comments
  id-token: write # needed for OCI OIDC

jobs:
  changes:
    name: "Detect changed paths"
    runs-on: ubuntu-latest
    outputs:
      iac: ${{ steps.filter.outputs.iac }}
    steps:
      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            iac:
              - 'iac/**'

  # ── IaC Lint & Validate (only when iac/** changed) ──────────────────────────
  lint-iac:
    name: "Lint & Validate IaC"
    runs-on: ubuntu-latest
    needs: changes
    # Only run when IaC files are touched in this PR
    if: |
      needs.changes.outputs.iac == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Lint IaC (tflint)
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run tflint
        run: |
          cd iac
          tflint --init
          tflint --recursive || exit 0

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.x"

      - name: Check formatting (tofu fmt)
        run: cd iac && tofu fmt -check -recursive

  # ── App Lint (only when apps/** changed) ─────────────────────────────────────
  lint-apps:
    name: "Lint Apps"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint portal (ESLint)
        if: hashFiles('apps/portal/package.json') != ''
        continue-on-error: true
        run: |
          cd apps/portal
          npm ci --prefer-offline
          npm run lint

      - name: Lint API (ESLint)
        if: hashFiles('apps/api/package.json') != ''
        continue-on-error: true
        run: |
          cd apps/api
          npm ci --prefer-offline
          npm run lint

      - name: Lint mitmproxy addon (flake8)
        if: hashFiles('apps/mitm/requirements.txt') != ''
        continue-on-error: true
        run: |
          pip install flake8 black --quiet
          flake8 apps/mitm/ --max-line-length=100
          black --check apps/mitm/

  # ── IaC Plan — Dev (only when iac/** changed, PR to development) ─────────────
  plan-dev:
    name: "Plan → dev"
    runs-on: ubuntu-latest
    needs: lint-iac
    # Only run if IaC lint job ran (means iac/ files were changed) and PR targets development
    if: |
      needs.lint-iac.result == 'success' &&
      github.base_ref == 'development'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci_region: "ca-toronto-1"

      - name: Plan dev
        uses: ./.github/actions/tofu-plan
        with:
          environment: dev
          working_directory: iac
          var_file: environments/dev/terraform.tfvars
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_oci_namespace: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_adguard_admin_password: ${{ secrets.ADGUARD_ADMIN_PASSWORD }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── IaC Plan — Prod (only when iac/** changed, PR to main) ───────────────────
  plan-prod:
    name: "Plan → prod"
    runs-on: ubuntu-latest
    needs: lint-iac
    if: |
      needs.lint-iac.result == 'success' &&
      github.base_ref == 'main'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci_region: "ca-toronto-1"

      - name: Plan prod
        uses: ./.github/actions/tofu-plan
        with:
          environment: prod
          working_directory: iac
          var_file: environments/prod/terraform.tfvars
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_oci_namespace: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_adguard_admin_password: ${{ secrets.ADGUARD_ADMIN_PASSWORD_PROD }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL_PROD }}
          TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY_PROD }}
          TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Security Scan (always runs) ───────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (IaC misconfiguration scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "iac/"
          format: "table"
          exit-code: "0" # Warn only on PRs, don't block
          severity: "CRITICAL,HIGH"

      - name: Run Checkov (Terraform security checks)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: iac/
          framework: terraform
          soft_fail: true # Warn only on PRs
