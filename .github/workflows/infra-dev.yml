# .github/workflows/infra-dev.yml
# Triggered on iac/** changes to development branch, or manually.
# Deploys OCI infrastructure (tofu apply), sets up Cloudflare tunnel,
# verifies portal reachable, then tightens SSH to admin IP only.
#
# NOTE: This workflow requires SSH access to the VM via PUBLIC IP.
# If the NSG was previously tightened (admin IP only), you must temporarily
# add your runner IP or 0.0.0.0/0 to the NSG before this workflow reaches
# the setup-cloudflare-dev job.
# OCI Console → Networking → VCNs → familyshield-dev → NSG → Add SSH rule
name: "FamilyShield — Infrastructure Dev"

on:
  push:
    branches: [development]
    paths:
      - "iac/**"
      - ".github/workflows/infra-dev.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

concurrency:
  group: infra-dev
  cancel-in-progress: false # Never cancel infra — partial tofu apply leaves state inconsistent

jobs:
  deploy-infra-dev:
    name: "IaC → dev (tofu apply)"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment:
      name: dev
      url: https://familyshield-dev.everythingcloud.ca
    outputs:
      vm_ip: ${{ steps.outputs.outputs.vm_ip }}
      nsg_vm_id: ${{ steps.outputs.outputs.nsg_vm_id }}

    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Verify bootstrap was completed
        shell: bash
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          echo "🔍 Verifying bootstrap setup exists in OCI..."

          POLICY=$(oci iam policy list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --all \
            --query "data[?name=='familyshield-bootstrap-policy'] | [0].name" \
            --raw-output 2>/dev/null || echo "")

          if [ -z "$POLICY" ] || [ "$POLICY" = "None" ]; then
            echo "❌ Bootstrap policy not found!"
            echo "Run: bash scripts/bootstrap-oci.sh"
            exit 1
          fi
          echo "   ✅ Bootstrap policy found"

          NAMESPACE=${{ secrets.OCI_NAMESPACE }}
          BUCKET=$(oci os bucket get \
            --namespace-name "$NAMESPACE" \
            --bucket-name "familyshield-tfstate" \
            --query "data.name" \
            --raw-output 2>/dev/null || echo "")

          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            echo "❌ State bucket not found!"
            exit 1
          fi
          echo "   ✅ State bucket found"
          echo "✅ Bootstrap verification passed"

      - name: Apply IaC → dev
        uses: ./.github/actions/tofu-apply
        with:
          environment: dev
          working_directory: iac
          var_file: environments/dev/terraform.tfvars
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_oci_namespace: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_adguard_admin_password: ${{ secrets.ADGUARD_ADMIN_PASSWORD }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Capture IaC outputs
        id: outputs
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          VM_IP=$(tofu output -raw vm_public_ip 2>/dev/null || echo "")
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT

          NSG_ID=$(tofu output -raw nsg_vm_id 2>/dev/null || echo "")
          echo "nsg_vm_id=$NSG_ID" >> $GITHUB_OUTPUT

          echo ""
          echo "📦 Infrastructure outputs:"
          tofu output -no-color

  setup-cloudflare-dev:
    name: "Cloudflare setup — dev"
    runs-on: ubuntu-latest
    needs: deploy-infra-dev
    if: needs.deploy-infra-dev.outputs.vm_ip != ''
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.x"

      - name: Get tunnel secret from IaC state
        id: iac
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
        run: |
          tofu init \
            -backend-config="bucket=familyshield-tfstate" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
            -backend-config="region=ca-toronto-1" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="use_path_style=true" \
            -reconfigure

          TUNNEL_SECRET=$(tofu output -raw tunnel_secret 2>/dev/null || echo "")
          if [ -z "$TUNNEL_SECRET" ]; then
            echo "❌ Failed to get tunnel_secret from IaC state"
            exit 1
          fi
          echo "::add-mask::$TUNNEL_SECRET"
          echo "tunnel_secret=$TUNNEL_SECRET" >> $GITHUB_OUTPUT

      - name: Setup Cloudflare (tunnel, DNS, access)
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          bash scripts/cloudflare-api.sh setup dev \
            "${{ steps.iac.outputs.tunnel_secret }}" \
            "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

      - name: Bootstrap VM — ensure docker-compose.yml exists
        shell: bash
        env:
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          VM_IP: ${{ needs.deploy-infra-dev.outputs.vm_ip }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield

          COMPOSE_EXISTS=$(ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ubuntu@"$VM_IP" \
            "test -f /opt/familyshield/docker-compose.yml && echo yes || echo no" 2>/dev/null || echo "no")

          if [ "$COMPOSE_EXISTS" = "yes" ]; then
            echo "✅ docker-compose.yml already exists on VM"
            exit 0
          fi

          echo "⚠️  docker-compose.yml missing — rendering template and copying to VM"
          sed \
            -e "s|\${environment}|dev|g" \
            -e "s|\${tunnel_token}|TUNNEL_TOKEN_PLACEHOLDER_dev|g" \
            -e "s|\${supabase_url}|$SUPABASE_URL|g" \
            -e "s|\${supabase_anon_key}|$SUPABASE_ANON_KEY|g" \
            -e "s|\${groq_api_key}|$GROQ_API_KEY|g" \
            -e "s|\${anthropic_api_key}|$ANTHROPIC_API_KEY|g" \
            -e 's|\$\${|\${|g' \
            iac/templates/docker-compose.yaml.tpl > /tmp/docker-compose.yml

          scp -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            /tmp/docker-compose.yml \
            ubuntu@"$VM_IP":/tmp/docker-compose.yml

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ubuntu@"$VM_IP" \
            "sudo mkdir -p /opt/familyshield && sudo mv /tmp/docker-compose.yml /opt/familyshield/docker-compose.yml && sudo chown ubuntu:ubuntu /opt/familyshield /opt/familyshield/docker-compose.yml"

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ubuntu@"$VM_IP" bash -s <<ENDSSH
          set -euo pipefail
          cd /opt/familyshield
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
          docker compose up -d redis
          sleep 5
          docker compose pull api portal
          docker compose up -d --remove-orphans api portal
          sleep 10
          docker compose ps
          echo "✅ VM bootstrap complete"
          ENDSSH

      - name: Write tunnel token to VM and activate cloudflared
        shell: bash
        env:
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          VM_IP: ${{ needs.deploy-infra-dev.outputs.vm_ip }}
          TUNNEL_TOKEN: ${{ steps.cloudflare.outputs.TUNNEL_TOKEN }}
        run: |
          echo "::add-mask::$TUNNEL_TOKEN"
          if [ -z "$TUNNEL_TOKEN" ]; then
            echo "❌ Tunnel token not available from cloudflare-api.sh output"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ubuntu@"$VM_IP" \
            "docker stop familyshield-cloudflared 2>/dev/null || true; \
             docker rm familyshield-cloudflared 2>/dev/null || true; \
             docker run -d \
               --name familyshield-cloudflared \
               --restart unless-stopped \
               --network host \
               cloudflare/cloudflared:latest \
               tunnel --no-autoupdate run --token $TUNNEL_TOKEN && \
             sleep 3 && \
             docker inspect familyshield-cloudflared --format '{{.State.Status}}' && \
             echo '✅ cloudflared started'"

  smoke-infra-dev:
    name: "Smoke test — infra (tunnel reachable)"
    runs-on: ubuntu-latest
    needs: setup-cloudflare-dev
    steps:
      - name: Wait for tunnel and verify portal reachable
        run: |
          PORTAL_URL="https://familyshield-dev.everythingcloud.ca"
          echo "Waiting for Cloudflare tunnel: $PORTAL_URL"
          for attempt in {1..18}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PORTAL_URL" || echo "000")
            if [[ "$STATUS" =~ ^(200|302|403)$ ]]; then
              echo "✅ Tunnel active — portal reachable (HTTP $STATUS, attempt $attempt)"
              exit 0
            fi
            echo "   Attempt $attempt/18 — HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "⚠️  Tunnel not confirmed after 3 min — check cloudflared logs on VM"
          exit 1

  tighten-ssh-dev:
    name: "Tighten SSH → admin IP only"
    runs-on: ubuntu-latest
    needs: [deploy-infra-dev, smoke-infra-dev]
    if: needs.deploy-infra-dev.outputs.nsg_vm_id != ''
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Restrict SSH to admin IP only
        env:
          NSG_ID: ${{ needs.deploy-infra-dev.outputs.nsg_vm_id }}
          ADMIN_IP: "173.33.214.49/32"
        shell: bash
        run: |
          set -euo pipefail

          echo "🔐 Tightening SSH to admin IP only ($ADMIN_IP)..."

          SSH_RULES=$(oci network nsg rule list \
            --nsg-id "$NSG_ID" \
            --output json 2>/dev/null || echo "[]")

          if ! echo "$SSH_RULES" | jq -e . >/dev/null 2>&1; then
            echo "⚠️  Failed to query NSG rules — skipping"
            SSH_RULES="[]"
          fi

          RULE_COUNT=$(echo "$SSH_RULES" | jq '[.data[] | select(.direction=="INGRESS" and .source=="0.0.0.0/0")] | length' 2>/dev/null || echo "0")
          echo "Found $RULE_COUNT broad SSH rule(s) to remove"

          echo "$SSH_RULES" | jq -r '.data[] | select(.direction=="INGRESS" and .source=="0.0.0.0/0") | .id' | \
          while IFS= read -r RULE_ID; do
            if [ -n "$RULE_ID" ] && [ "$RULE_ID" != "null" ]; then
              oci network nsg rule delete \
                --nsg-rule-id "$RULE_ID" \
                --force 2>/dev/null || true
              echo "   Removed: $RULE_ID"
            fi
          done

          # Check if admin IP rule already exists before adding
          ADMIN_EXISTS=$(echo "$SSH_RULES" | jq -r --arg ip "$ADMIN_IP" \
            '.data[] | select(.direction=="INGRESS" and .source==$ip) | .id' 2>/dev/null | head -1 || echo "")

          if [ -z "$ADMIN_EXISTS" ]; then
            oci network nsg rule create \
              --nsg-id "$NSG_ID" \
              --direction INGRESS \
              --protocol 6 \
              --source "$ADMIN_IP" \
              --source-type CIDR_BLOCK \
              --tcp-options "destinationPortRange={min:22,max:22}"
            echo "✅ SSH tightened to admin IP only ($ADMIN_IP)"
          else
            echo "✅ Admin IP rule already present — no change needed"
          fi
