# .github/workflows/infra-dev.yml
# Triggered on iac/** changes to development branch, or manually.
# Deploys OCI infrastructure (tofu apply), sets up Cloudflare tunnel,
# verifies portal reachable, then tightens SSH to admin IP only.
#
# NOTE: This workflow requires SSH access to the VM via PUBLIC IP.
# If the NSG was previously tightened (admin IP only), you must temporarily
# add your runner IP or 0.0.0.0/0 to the NSG before this workflow reaches
# the setup-cloudflare-dev job.
# OCI Console → Networking → VCNs → familyshield-dev → NSG → Add SSH rule
name: "FamilyShield — Infrastructure Dev"

on:
  push:
    branches: [ development ]
    paths:
      - "iac/**"
      - ".github/workflows/infra-dev.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

concurrency:
  group: infra-dev
  cancel-in-progress: false # Never cancel infra — partial tofu apply leaves state inconsistent

jobs:
  deploy-infra-dev:
    name: "IaC → dev (tofu apply)"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment:
      name: dev
      url: https://familyshield-dev.everythingcloud.ca
    outputs:
      vm_ip: ${{ steps.outputs.outputs.vm_ip }}

    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Verify bootstrap was completed
        shell: bash
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          echo "🔍 Verifying bootstrap setup exists in OCI..."

          POLICY=$(oci iam policy list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --all \
            --query "data[?name=='familyshield-bootstrap-policy'] | [0].name" \
            --raw-output 2>/dev/null || echo "")

          if [ -z "$POLICY" ] || [ "$POLICY" = "None" ]; then
            echo "❌ Bootstrap policy not found!"
            echo "Run: bash scripts/bootstrap-oci.sh"
            exit 1
          fi
          echo "   ✅ Bootstrap policy found"

          NAMESPACE=${{ secrets.OCI_NAMESPACE }}
          BUCKET=$(oci os bucket get \
            --namespace-name "$NAMESPACE" \
            --bucket-name "familyshield-tfstate" \
            --query "data.name" \
            --raw-output 2>/dev/null || echo "")

          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            echo "❌ State bucket not found!"
            exit 1
          fi
          echo "   ✅ State bucket found"
          echo "✅ Bootstrap verification passed"

      - name: Apply IaC → dev
        uses: ./.github/actions/tofu-apply
        with:
          environment: dev
          working_directory: iac
          var_file: environments/dev/terraform.tfvars
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_oci_namespace: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_adguard_admin_password: ${{ secrets.ADGUARD_ADMIN_PASSWORD }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_influxdb_password: ${{ secrets.INFLUXDB_PASSWORD }}
          TF_VAR_influxdb_admin_token: ${{ secrets.TF_VAR_INFLUXDB_ADMIN_TOKEN }}
          TF_VAR_grafana_password: ${{ secrets.GRAFANA_PASSWORD }}

      - name: Capture IaC outputs
        id: outputs
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          VM_IP=$(tofu output -raw vm_public_ip 2>/dev/null || echo "")
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT

          echo ""
          echo "📦 Infrastructure outputs:"
          tofu output -no-color

  setup-cloudflare-dev:
    name: "Cloudflare setup — dev"
    runs-on: ubuntu-latest
    needs: deploy-infra-dev
    if: needs.deploy-infra-dev.outputs.vm_ip != ''
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.x"

      - name: Apply Cloudflare IaC (tunnel, DNS, access, WAF)
        id: cf_apply
        working-directory: iac/cloudflare
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_environment: dev
        run: |
          set -euo pipefail

          tofu init \
            -backend-config="bucket=familyshield-tfstate" \
            -backend-config="key=cloudflare/dev/terraform.tfstate" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
            -backend-config="region=ca-toronto-1" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="use_path_style=true" \
            -reconfigure

          tofu apply \
            -var-file="environments/dev/terraform.tfvars" \
            -auto-approve \
            -no-color

          echo "✅ Cloudflare IaC apply complete (tunnel + DNS + access + WAF)"

      - name: Capture Cloudflare outputs
        id: cf_outputs
        working-directory: iac/cloudflare
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
        run: |
          TUNNEL_TOKEN=$(tofu output -raw tunnel_token 2>/dev/null)
          CLIENT_ID=$(tofu output -raw service_token_client_id 2>/dev/null)
          CLIENT_SECRET=$(tofu output -raw service_token_client_secret 2>/dev/null)

          echo "::add-mask::$TUNNEL_TOKEN"
          echo "::add-mask::$CLIENT_SECRET"

          echo "tunnel_token=$TUNNEL_TOKEN"   >> $GITHUB_OUTPUT
          echo "client_id=$CLIENT_ID"         >> $GITHUB_OUTPUT
          echo "client_secret=$CLIENT_SECRET" >> $GITHUB_OUTPUT

      - name: Update GitHub secrets with fresh service token
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          CLIENT_ID: ${{ steps.cf_outputs.outputs.client_id }}
          CLIENT_SECRET: ${{ steps.cf_outputs.outputs.client_secret }}
        run: |
          # Update repo secrets so deploy-dev.yml always has valid service token credentials
          gh secret set CF_ACCESS_CLIENT_ID     --body "$CLIENT_ID"     --repo "$REPO"
          gh secret set CF_ACCESS_CLIENT_SECRET --body "$CLIENT_SECRET" --repo "$REPO"
          echo "✅ GitHub secrets updated: CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET"

      - name: Bootstrap VM — write docker-compose.yml and start services
        shell: bash
        env:
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          VM_IP: ${{ needs.deploy-infra-dev.outputs.vm_ip }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          INFLUXDB_PASSWORD: ${{ secrets.INFLUXDB_PASSWORD || 'FamilyShield-Influx-Dev' }}
          INFLUXDB_ADMIN_TOKEN: ${{ secrets.TF_VAR_INFLUXDB_ADMIN_TOKEN ||
            'FamilyShield-InfluxDB-Token-Dev' }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD || 'FamilyShield-Grafana-Dev' }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield

          # Always render and write the latest docker-compose.yml to ensure template changes take effect.
          # This is intentional — every infra run guarantees the VM has the current template.
          echo "📝 Rendering docker-compose.yml from template..."
          sed \
            -e "s|\${environment}|dev|g" \
            -e "s|\${env_suffix}|-dev|g" \
            -e "s|\${tunnel_token}|TUNNEL_TOKEN_PLACEHOLDER_dev|g" \
            -e "s|\${supabase_url}|$SUPABASE_URL|g" \
            -e "s|\${supabase_anon_key}|$SUPABASE_ANON_KEY|g" \
            -e "s|\${supabase_service_role_key}|$SUPABASE_SERVICE_ROLE_KEY|g" \
            -e "s|\${groq_api_key}|$GROQ_API_KEY|g" \
            -e "s|\${anthropic_api_key}|$ANTHROPIC_API_KEY|g" \
            -e "s|\${youtube_api_key}|$YOUTUBE_API_KEY|g" \
            -e "s|\${discord_bot_token}|$DISCORD_BOT_TOKEN|g" \
            -e "s|\${twitch_client_id}|$TWITCH_CLIENT_ID|g" \
            -e "s|\${twitch_client_secret}|$TWITCH_CLIENT_SECRET|g" \
            -e "s|\${influxdb_password}|$INFLUXDB_PASSWORD|g" \
            -e "s|\${influxdb_admin_token}|$INFLUXDB_ADMIN_TOKEN|g" \
            -e "s|\${grafana_password}|$GRAFANA_PASSWORD|g" \
            -e 's|\$\${|\${|g' \
            iac/templates/docker-compose.yaml.tpl > /tmp/docker-compose.yml

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ubuntu@"$VM_IP" \
            "cat > /tmp/docker-compose.yml" < /tmp/docker-compose.yml

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ubuntu@"$VM_IP" \
            "sudo mkdir -p /opt/familyshield && sudo mv /tmp/docker-compose.yml /opt/familyshield/docker-compose.yml && sudo chown ubuntu:ubuntu /opt/familyshield /opt/familyshield/docker-compose.yml"

          echo "✅ docker-compose.yml written to VM"

          # Copy platform service configs — these are bind-mounted into containers
          # and must exist on the VM before docker compose up runs.
          # deploy-dev.yml will overwrite with the full content later.
          scp -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            apps/platform-config/headscale/headscale.yaml \
            ubuntu@"$VM_IP":/tmp/headscale.yaml

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ubuntu@"$VM_IP" \
            "sudo mkdir -p /opt/familyshield/apps/platform-config/headscale && sudo mv /tmp/headscale.yaml /opt/familyshield/apps/platform-config/headscale/headscale.yaml && sudo chown ubuntu:ubuntu /opt/familyshield/apps/platform-config/headscale/headscale.yaml"

          echo "✅ headscale config written to VM"

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ubuntu@"$VM_IP" bash -s <<ENDSSH
          set -euo pipefail
          sudo cloud-init status --wait || true

          # ── Mount persistent data volume ─────────────────────────────────────────
          # tofu apply has completed by the time this runs — the OCI volume IS attached.
          # cloud-init may have raced with the attachment; we guarantee the mount here.
          if sudo test -b "/dev/oracleoci/oraclevdb"; then
            if ! sudo mountpoint -q "/opt/familyshield-data" 2>/dev/null; then
              if ! sudo blkid /dev/oracleoci/oraclevdb | grep -q TYPE; then
                echo "📦 First boot — formatting persistent data volume..."
                sudo mkfs.ext4 -L familyshield-data -F /dev/oracleoci/oraclevdb
              fi
              sudo mkdir -p /opt/familyshield-data
              sudo mount /dev/oracleoci/oraclevdb /opt/familyshield-data
              DEVICE_UUID=\$(sudo blkid -s UUID -o value /dev/oracleoci/oraclevdb)
              grep -q "\$DEVICE_UUID" /etc/fstab || echo "UUID=\$DEVICE_UUID /opt/familyshield-data ext4 defaults,_netdev,nofail 0 2" | sudo tee -a /etc/fstab > /dev/null
              echo "✅ Persistent data volume mounted at /opt/familyshield-data"
            else
              echo "✅ Persistent data volume already mounted"
            fi
          else
            echo "⚠️  Block device /dev/oracleoci/oraclevdb not found — containers will use boot volume (fallback)"
          fi

          # Create service data directories on persistent volume (idempotent — safe on every run)
          sudo mkdir -p \
            /opt/familyshield-data/adguard/work \
            /opt/familyshield-data/adguard/conf \
            /opt/familyshield-data/headscale \
            /opt/familyshield-data/influxdb \
            /opt/familyshield-data/grafana \
            /opt/familyshield-data/mitmproxy \
            /opt/familyshield-data/redis \
            /opt/familyshield-data/ntfy/cache \
            /opt/familyshield-data/ntfy/data
          sudo chown -R ubuntu:ubuntu /opt/familyshield-data
          # Per-service ownership — must match container user UIDs
          sudo chown -R 472:472 /opt/familyshield-data/grafana          # Grafana runs as uid 472
          sudo chown -R 1000:1000 /opt/familyshield-data/mitmproxy      # mitmproxy user in container is uid/gid 1000

          # Free port 53 from systemd-resolved (Ubuntu 22.04 default — conflicts with AdGuard)
          sudo mkdir -p /etc/systemd/resolved.conf.d
          echo -e "[Resolve]\nDNSStubListener=no" | sudo tee /etc/systemd/resolved.conf.d/no-stub.conf > /dev/null
          sudo systemctl restart systemd-resolved
          sudo ln -sf /run/systemd/resolve/resolv.conf /etc/resolv.conf

          cd /opt/familyshield
          echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          # Pre-create bind-mount directories with correct ownership before containers start.
          # deploy-dev.yml syncs real content later; these ensure containers don't crash on first boot.
          # Node-RED runs as uid 1000 (node) — /data must be writable by that user.
          sudo mkdir -p apps/platform-config/nodered
          sudo mkdir -p apps/platform-config/headscale
          sudo mkdir -p apps/platform-config/grafana/provisioning
          sudo mkdir -p apps/platform-config/ntfy
          sudo mkdir -p apps/mitm
          sudo chown -R 1000:1000 apps/

          # Pull and start infrastructure services (public images — always available)
          # App services (api, portal, mitmproxy) are managed by deploy-dev.yml
          # Use --ignore-pull-failures to skip missing app service images (not pushed yet)
          sudo docker compose pull --ignore-pull-failures adguard headscale redis influxdb grafana nodered ntfy
          sudo docker compose up -d --no-deps adguard headscale redis influxdb grafana nodered ntfy
          echo "✅ Infrastructure services started (api/portal/mitmproxy started by deploy-dev.yml)"

          sleep 10
          sudo docker compose ps
          ENDSSH

      - name: Write tunnel token to VM and activate cloudflared
        shell: bash
        env:
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          VM_IP: ${{ needs.deploy-infra-dev.outputs.vm_ip }}
          TUNNEL_TOKEN: ${{ steps.cf_outputs.outputs.tunnel_token }}
        run: |
          echo "::add-mask::$TUNNEL_TOKEN"
          if [ -z "$TUNNEL_TOKEN" ]; then
            echo "❌ Tunnel token not available from Cloudflare IaC outputs"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ubuntu@"$VM_IP" \
            "docker stop familyshield-cloudflared 2>/dev/null || true; \
             docker rm familyshield-cloudflared 2>/dev/null || true; \
             docker run -d \
               --name familyshield-cloudflared \
               --restart unless-stopped \
               --network host \
               cloudflare/cloudflared:latest \
               tunnel --no-autoupdate run --token $TUNNEL_TOKEN && \
             sleep 3 && \
             docker inspect familyshield-cloudflared --format '{{.State.Status}}' && \
             echo '✅ cloudflared started'"

  smoke-infra-dev:
    name: "Smoke test — infra (cloudflared registered)"
    runs-on: ubuntu-latest
    needs: [ deploy-infra-dev, setup-cloudflare-dev ]
    steps:
      - name: Verify cloudflared registered via public IP SSH
        env:
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          VM_IP: ${{ needs.deploy-infra-dev.outputs.vm_ip }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield

          echo "Verifying cloudflared is running and registered on $VM_IP"
          for attempt in {1..12}; do
            LOGS=$(ssh -i ~/.ssh/familyshield \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              ubuntu@"$VM_IP" \
              "docker logs familyshield-cloudflared --tail 30 2>&1" 2>/dev/null || echo "")

            if echo "$LOGS" | grep -q "Registered tunnel connection"; then
              echo "✅ cloudflared registered with Cloudflare (attempt $attempt)"
              exit 0
            fi

            STATUS=$(ssh -i ~/.ssh/familyshield \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              ubuntu@"$VM_IP" \
              "docker inspect familyshield-cloudflared --format '{{.State.Status}}' 2>/dev/null" 2>/dev/null || echo "unknown")

            echo "   Attempt $attempt/12 — container: $STATUS, waiting 10s..."
            sleep 10
          done
          echo "⚠️  cloudflared not registered after 2 min — dumping logs:"
          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ubuntu@"$VM_IP" \
            "docker logs familyshield-cloudflared --tail 50 2>&1" 2>/dev/null || true
          exit 1

  tighten-ssh-dev:
    name: "Tighten SSH → admin IP only (via tofu)"
    runs-on: ubuntu-latest
    needs: [ deploy-infra-dev, smoke-infra-dev ]
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.x"

      - name: Tighten SSH to admin IP via tofu apply
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_oci_namespace: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_adguard_admin_password: ${{ secrets.ADGUARD_ADMIN_PASSWORD }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_influxdb_password: ${{ secrets.INFLUXDB_PASSWORD }}
          TF_VAR_influxdb_admin_token: ${{ secrets.TF_VAR_INFLUXDB_ADMIN_TOKEN }}
          TF_VAR_grafana_password: ${{ secrets.GRAFANA_PASSWORD }}
          TF_VAR_admin_ssh_cidrs: "[\"173.33.214.49/32\"]"
        shell: bash
        run: |
          set -euo pipefail

          echo "🔐 Tightening SSH to admin IP only via tofu apply..."

          tofu init \
            -backend-config="bucket=familyshield-tfstate" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
            -backend-config="region=ca-toronto-1" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="use_path_style=true" \
            -reconfigure

          tofu apply \
            -var="environment=dev" \
            -var-file="environments/dev/terraform.tfvars" \
            -auto-approve \
            -no-color

          echo "✅ SSH tightened to admin IP only (state kept consistent)"
