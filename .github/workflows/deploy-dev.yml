# .github/workflows/deploy-dev.yml
# Triggered on apps/** changes to development branch, or manually,
# or after infra-dev.yml completes (to restart containers on fresh VM).
#
# Uses Cloudflare Tunnel SSH exclusively — never touches public IP.
# Works regardless of NSG state (0.0.0.0/0 or tightened to admin IP).
#
# Mixed commit handling (iac/ + apps/ changed in same push):
#   Both infra-dev.yml and deploy-dev.yml trigger. The wait-for-infra job
#   polls GitHub API and waits up to 10 min for infra-dev.yml to finish.
name: "FamilyShield — Deploy Dev"

on:
  push:
    branches: [ development ]
    paths:
      - "apps/**"
      - "scripts/**"
      - ".github/workflows/deploy-dev.yml"
  workflow_dispatch:
  workflow_run:
    workflows: [ "FamilyShield — Infrastructure Dev" ]
    types: [ completed ]
    branches: [ development ]

permissions:
  contents: read
  id-token: write
  packages: write
  actions: read # Needed to poll workflow runs for wait-for-infra

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  wait-for-infra:
    name: "Wait for infra-dev if running"
    runs-on: ubuntu-latest
    # Only poll when triggered by a direct push — workflow_run already waits for infra
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      infra_conclusion: ${{ steps.poll.outputs.infra_conclusion }}
    steps:
      - name: Poll for running infra-dev workflow
        id: poll
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          echo "Checking if infra-dev.yml is running for this commit..."
          MAX_WAIT=600  # 10 minutes
          INTERVAL=30
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Find infra-dev runs triggered by the same commit
            RUN=$(gh api \
              "repos/$REPO/actions/workflows/infra-dev.yml/runs?branch=development&per_page=5" \
              --jq '.workflow_runs[] | select(.head_sha == env.SHA) | {status: .status, conclusion: .conclusion, id: .id}' \
              2>/dev/null | head -1 || echo "")

            if [ -z "$RUN" ]; then
              echo "ℹ️  No infra-dev run found for this commit — proceeding"
              echo "infra_conclusion=none" >> $GITHUB_OUTPUT
              exit 0
            fi

            STATUS=$(echo "$RUN" | jq -r '.status')
            CONCLUSION=$(echo "$RUN" | jq -r '.conclusion')

            if [ "$STATUS" = "completed" ]; then
              echo "✅ infra-dev completed with conclusion: $CONCLUSION"
              echo "infra_conclusion=$CONCLUSION" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "   infra-dev status: $STATUS — waiting ${INTERVAL}s... (${ELAPSED}s elapsed)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "⚠️  Timed out waiting for infra-dev — proceeding anyway"
          echo "infra_conclusion=timeout" >> $GITHUB_OUTPUT

  verify-tunnel:
    name: "Verify Cloudflare tunnel SSH is reachable"
    runs-on: ubuntu-latest
    needs: wait-for-infra
    if: |
      always() &&
      (needs.wait-for-infra.result == 'success' || needs.wait-for-infra.result == 'skipped')
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared version

      - name: Verify SSH tunnel reachable
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          SSH_HOST="ssh-dev.everythingcloud.ca"

          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield

          # cloudflared reads TUNNEL_SERVICE_TOKEN_ID / TUNNEL_SERVICE_TOKEN_SECRET
          # CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET are the HTTP header names — not cloudflared env vars
          # Passing credentials explicitly via flags is the only reliable method
          for attempt in {1..5}; do
            echo "Checking SSH tunnel reachability: $SSH_HOST (attempt $attempt/5)"
            SSH_OUT=$(ssh -v -i ~/.ssh/familyshield \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=15 \
              -o ProxyCommand="cloudflared access ssh --hostname ${SSH_HOST} --service-token-id ${CF_ACCESS_CLIENT_ID} --service-token-secret ${CF_ACCESS_CLIENT_SECRET}" \
              ubuntu@"${SSH_HOST}" echo "tunnel-ok" 2>&1)
            EXIT=$?
            if [ $EXIT -eq 0 ]; then
              echo "✅ SSH tunnel reachable"
              exit 0
            fi
            echo "   Exit $EXIT — last lines:"
            echo "$SSH_OUT" | tail -5
            [ $attempt -lt 5 ] && sleep 15
          done
          echo "❌ SSH tunnel not reachable after 5 attempts"
          exit 1

  build-and-push:
    name: "Build & Push Docker images"
    runs-on: ubuntu-latest
    needs: verify-tunnel
    strategy:
      matrix:
        app: [ api, portal, mitm ]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/everythingcloudsolutions/familyshield-${{ matrix.app }}:dev
            ghcr.io/everythingcloudsolutions/familyshield-${{ matrix.app }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64 # OCI Always Free ARM

  deploy-app-dev:
    name: "App deploy → dev VM (via Cloudflare tunnel SSH)"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: dev
      url: https://familyshield-dev.everythingcloud.ca
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Prepare SSH key
        env:
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield

      - name: Sync runtime assets to VM
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          SSH_HOST="ssh-dev.everythingcloud.ca"

          tar -czf /tmp/familyshield-runtime-assets.tgz apps/mitm apps/platform-config

          # Transfer via SSH stdin pipe — avoids SFTP protocol (scp uses SFTP by default
          # on Ubuntu 22.04, which Cloudflare Access rejects with "websocket: bad handshake")
          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand="cloudflared access ssh --hostname ${SSH_HOST} --service-token-id ${CF_ACCESS_CLIENT_ID} --service-token-secret ${CF_ACCESS_CLIENT_SECRET}" \
            ubuntu@"${SSH_HOST}" \
            "cat > /tmp/familyshield-runtime-assets.tgz" \
            < /tmp/familyshield-runtime-assets.tgz

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand="cloudflared access ssh --hostname ${SSH_HOST} --service-token-id ${CF_ACCESS_CLIENT_ID} --service-token-secret ${CF_ACCESS_CLIENT_SECRET}" \
            ubuntu@"${SSH_HOST}" \
            "mkdir -p /opt/familyshield && sudo tar -xzf /tmp/familyshield-runtime-assets.tgz -C /opt/familyshield"

          echo "✅ Runtime assets synced"

      - name: Deploy containers via tunnel SSH
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          SSH_HOST="ssh-dev.everythingcloud.ca"

          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand="cloudflared access ssh --hostname ${SSH_HOST} --service-token-id ${CF_ACCESS_CLIENT_ID} --service-token-secret ${CF_ACCESS_CLIENT_SECRET}" \
            ubuntu@"${SSH_HOST}" bash -s <<ENDSSH
          set -euo pipefail
          cd /opt/familyshield

          # Write runtime API secrets to .env — docker compose reads this automatically
          # Secrets baked into docker-compose.yaml by Terraform (SUPABASE_*, GROQ_*, ANTHROPIC_*)
          # These four require shell interpolation from .env at compose-up time
          cat > /opt/familyshield/.env <<'ENVEOF'
          YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
          DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
          TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
          TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
          ENVEOF
          chmod 600 /opt/familyshield/.env

          echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          # Mirror root docker login to ubuntu user so non-sudo docker commands
          # (and systemd services running as ubuntu) can access GHCR credentials.
          sudo mkdir -p /home/ubuntu/.docker
          sudo cp /root/.docker/config.json /home/ubuntu/.docker/config.json 2>/dev/null || true
          sudo chown -R ubuntu:ubuntu /home/ubuntu/.docker
          sudo chmod 600 /home/ubuntu/.docker/config.json 2>/dev/null || true

          # Pull only the images that changed (GHCR — requires auth)
          # Include mitm so the mitmproxy image is available locally and docker
          # won't attempt an authenticated pull later from an un-logged-in user.
          sudo docker compose pull api portal mitm

          # Bring up all services — starts any stopped containers, recreates only changed ones
          sudo docker compose up -d --remove-orphans

          sleep 15
          sudo docker compose ps
          echo "✅ Deploy complete"
          ENDSSH

  smoke-test:
    name: "Smoke test — dev"
    runs-on: ubuntu-latest
    needs: deploy-app-dev
    steps:
      - name: Check portal and API health
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          BASE_URL="https://familyshield-dev.everythingcloud.ca"

          CF_HEADERS=()
          if [ -n "$CF_ACCESS_CLIENT_ID" ] && [ -n "$CF_ACCESS_CLIENT_SECRET" ]; then
            CF_HEADERS=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET")
          fi

          echo "Checking portal..."
          PASSED=false
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${CF_HEADERS[@]}" "$BASE_URL" || echo "000")
            if [[ "$STATUS" =~ ^(200|302|403)$ ]]; then
              echo "✅ Portal reachable (HTTP $STATUS)"
              PASSED=true
              break
            elif [[ "$STATUS" =~ ^5 ]]; then
              echo "❌ Server error $STATUS"
              exit 1
            fi
            echo "Attempt $i: $STATUS — waiting 15s..."
            sleep 15
          done

          if [ "$PASSED" = "false" ]; then
            echo "❌ Portal not reachable after 10 attempts (last: $STATUS)"
            exit 1
          fi

          echo "Checking API health..."
          API_URL="https://api-dev.everythingcloud.ca/health"
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${CF_HEADERS[@]}" "$API_URL" || echo "000")
          if [[ "$API_STATUS" =~ ^(200|403)$ ]]; then
            echo "✅ API reachable (HTTP $API_STATUS)"
          else
            echo "❌ API health check failed (HTTP $API_STATUS)"
            exit 1
          fi

          echo "✅ All smoke tests passed"
