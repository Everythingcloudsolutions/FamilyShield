# .github/workflows/teardown-dev.yml
# Manually triggered — completely destroys the dev environment.
# Removes: Docker containers, Cloudflare tunnel/DNS/access, all OCI resources (VM, VCN, storage).
# The shared tfstate bucket and compartments (created by bootstrap) are NOT deleted.
name: "☠️ Teardown → Dev"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "dev" to confirm full teardown of the dev environment'
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: teardown-dev
  cancel-in-progress: false

jobs:
  # ── Job 1: Stop containers + remove Cloudflare resources ─────────────────
  pre-teardown:
    name: "Stop containers + cleanup Cloudflare → dev"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'dev'
    environment:
      name: dev
    outputs:
      vm_ip: ${{ steps.iac.outputs.vm_ip }}

    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.x"

      - name: Read VM IP from IaC state
        id: iac
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
        run: |
          tofu init \
            -backend-config="bucket=familyshield-tfstate" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
            -backend-config="region=ca-toronto-1" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="use_path_style=true" \
            -reconfigure

          VM_IP=$(tofu output -raw vm_public_ip 2>/dev/null || echo "")
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT
          echo "VM IP: ${VM_IP:-<not found — VM may already be destroyed>}"

      - name: Stop all containers on VM
        if: steps.iac.outputs.vm_ip != ''
        shell: bash
        env:
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          VM_IP: ${{ steps.iac.outputs.vm_ip }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield
          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ubuntu@"$VM_IP" \
            "cd /opt/familyshield 2>/dev/null && \
             docker stop familyshield-cloudflared 2>/dev/null || true && \
             docker rm familyshield-cloudflared 2>/dev/null || true && \
             docker compose down --remove-orphans 2>/dev/null || true && \
             echo '✅ All containers stopped'" \
            || echo "⚠️  SSH unreachable — VM may already be gone, continuing"

      - name: Cleanup Cloudflare resources (tunnel, DNS, access)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          bash scripts/cloudflare-api.sh cleanup dev || true
          echo "✅ Cloudflare cleanup complete (or resources already absent)"

  # ── Job 2: Destroy all OCI infrastructure via tofu destroy ───────────────
  destroy-infra:
    name: "tofu destroy → dev"
    runs-on: ubuntu-latest
    needs: pre-teardown
    environment:
      name: dev

    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.x"

      - name: tofu init
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
        run: |
          tofu init \
            -backend-config="bucket=familyshield-tfstate" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
            -backend-config="region=ca-toronto-1" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="use_path_style=true" \
            -reconfigure

      - name: tofu destroy
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_oci_namespace: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_adguard_admin_password: ${{ secrets.ADGUARD_ADMIN_PASSWORD }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          tofu destroy \
            -var="environment=dev" \
            -var-file="environments/dev/terraform.tfvars" \
            -auto-approve \
            -no-color
          echo "✅ Dev environment fully destroyed"
          echo "ℹ️  The shared tfstate bucket and compartments (bootstrap) were NOT deleted"
          echo "ℹ️  Re-deploy at any time with: gh workflow run deploy-dev.yml --ref development"
