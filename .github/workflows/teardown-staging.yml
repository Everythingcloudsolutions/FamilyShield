# .github/workflows/teardown-staging.yml
# Manual fallback — use this if deploy-staging.yml itself fails mid-way and leaves
# staging infrastructure orphaned (e.g. IaC applied but deploy-app or Cloudflare failed).
#
# Normal flow (auto):
#   deploy-staging.yml always runs auto-teardown after integration tests — no manual action needed.
#
# Manual fallback:
#   Actions → "☠️ Teardown → Staging (manual fallback)" → Run workflow → confirm: staging
#
# What gets destroyed:
#   - All containers on the staging VM (docker compose down)
#   - Cloudflare tunnel, DNS records, and access app for staging
#   - All OCI resources in the staging state: VM, VCN, subnet, security list
#
# What is NOT touched:
#   - The shared tfstate bucket (created by bootstrap, shared across envs)
#   - The staging compartment (created by bootstrap-oci.sh Step 7)
name: "☠️ Teardown → Staging (manual fallback)"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "staging" to confirm manual teardown of the staging environment'
        required: true

permissions:
  contents: write   # needed to delete qa branch
  id-token: write

concurrency:
  group: teardown-staging
  cancel-in-progress: false

jobs:
  # ── Job 1: Stop containers + remove Cloudflare resources ─────────────────
  pre-teardown:
    name: "Stop containers + cleanup Cloudflare → staging"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'staging'
    outputs:
      vm_ip: ${{ steps.iac.outputs.vm_ip }}

    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.x"

      - name: Read VM IP from IaC state
        id: iac
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
        run: |
          tofu init \
            -backend-config="bucket=familyshield-tfstate" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
            -backend-config="region=ca-toronto-1" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="use_path_style=true" \
            -reconfigure

          VM_IP=$(tofu output -raw vm_public_ip 2>/dev/null || echo "")
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT
          echo "VM IP: ${VM_IP:-<not found — VM may already be destroyed>}"

      - name: Stop all containers on staging VM
        if: steps.iac.outputs.vm_ip != ''
        shell: bash
        env:
          SSH_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          VM_IP: ${{ steps.iac.outputs.vm_ip }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/familyshield
          chmod 600 ~/.ssh/familyshield
          ssh -i ~/.ssh/familyshield \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            ubuntu@"$VM_IP" \
            "cd /opt/familyshield 2>/dev/null && \
             docker stop familyshield-cloudflared 2>/dev/null || true && \
             docker rm familyshield-cloudflared 2>/dev/null || true && \
             docker compose down --remove-orphans 2>/dev/null || true && \
             echo '✅ All containers stopped'" \
            || echo "⚠️  SSH unreachable — VM may already be gone, continuing"

      - name: Cleanup Cloudflare resources (tunnel, DNS, access)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          bash scripts/cloudflare-api.sh cleanup staging || true
          echo "✅ Cloudflare cleanup complete (or resources already absent)"

  # ── Job 2: Destroy all OCI infrastructure via tofu destroy ───────────────
  destroy-infra:
    name: "tofu destroy → staging"
    runs-on: ubuntu-latest
    needs: pre-teardown

    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid: ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.x"

      - name: tofu init
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
        run: |
          tofu init \
            -backend-config="bucket=familyshield-tfstate" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.ca-toronto-1.oraclecloud.com" \
            -backend-config="region=ca-toronto-1" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="use_path_style=true" \
            -reconfigure

      - name: tofu destroy
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_oci_namespace: ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_adguard_admin_password: ${{ secrets.ADGUARD_ADMIN_PASSWORD }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL_STAGING }}
          TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY_STAGING }}
          TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          tofu destroy \
            -var="environment=staging" \
            -var-file="environments/staging/terraform.tfvars" \
            -auto-approve \
            -no-color || { echo "❌ tofu destroy failed — check logs above"; exit 1; }
          echo "✅ Staging environment fully destroyed (Always Free quota released)"
          echo "ℹ️  The shared tfstate bucket and compartments (bootstrap) were NOT deleted"

      - name: Delete qa branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X DELETE /repos/${{ github.repository }}/git/refs/heads/qa \
            && echo "✅ qa branch deleted" \
            || echo "⚠️  qa branch already deleted or not found"
