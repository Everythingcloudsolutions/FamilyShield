# .github/workflows/cleanup-state.yml
# One-time cleanup to delete the old Terraform state file from S3
name: Cleanup State File

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to cleanup"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read

jobs:
  delete-state:
    name: "Delete old state file"
    runs-on: ubuntu-latest

    steps:
      - name: Delete state file from OCI S3
        run: |
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}

          STATE_KEY="${{ inputs.environment }}/terraform.tfstate"
          S3_ENDPOINT="https://${{ secrets.OCI_NAMESPACE }}.compat.objectstorage.ca-toronto-1.oraclecloud.com"

          echo "Deleting state file: $STATE_KEY from $S3_ENDPOINT"

          aws s3api delete-object \
            --bucket familyshield-tfstate \
            --key "$STATE_KEY" \
            --endpoint-url "$S3_ENDPOINT" \
            --region ca-toronto-1

          echo "✅ State file deleted (if it existed)"

      - name: Summary
        run: |
          echo "## ✅ State Cleanup Complete"
          echo ""
          echo "The old Terraform state file for **${{ inputs.environment }}** has been deleted."
          echo ""
          echo "Next steps:"
          echo "1. Run the **Deploy → Dev** workflow to provision fresh infrastructure"
          echo "2. It will create a new state file with only the resources it creates"
