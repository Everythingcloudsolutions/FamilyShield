# .github/workflows/deploy-staging.yml
# Triggered automatically after deploy-dev succeeds
# No manual approval needed — staging mirrors prod config
name: Deploy → Staging

on:
  workflow_run:
    workflows: ["Deploy → Dev"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  gate:
    name: Check dev passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - run: echo "Dev passed — proceeding to staging"

  deploy-infra-staging:
    name: "IaC → staging"
    runs-on: ubuntu-latest
    needs: gate
    environment:
      name: staging
      url: https://familyshield-staging.everythingcloud.ca

    steps:
      - uses: actions/checkout@v4

      - name: OCI Login
        uses: ./.github/actions/oci-login
        with:
          oci_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci_user_ocid:    ${{ secrets.OCI_USER_OCID }}
          oci_fingerprint:  ${{ secrets.OCI_FINGERPRINT }}
          oci_private_key:  ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Apply IaC → staging
        uses: ./.github/actions/tofu-apply
        with:
          environment:       staging
          working_directory: iac
          var_file:          environments/staging/terraform.tfvars
        env:
          TF_VAR_oci_tenancy_ocid:       ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_oci_namespace:          ${{ secrets.OCI_NAMESPACE }}
          TF_VAR_ssh_public_key:         ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_cloudflare_api_token:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id:     ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_account_id:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_admin_emails:           '["mohit.goyal@everythingcloud.ca"]'
          TF_VAR_adguard_admin_password: ${{ secrets.ADGUARD_ADMIN_PASSWORD }}
          TF_VAR_supabase_url:           ${{ secrets.SUPABASE_URL_STAGING }}
          TF_VAR_supabase_anon_key:      ${{ secrets.SUPABASE_ANON_KEY_STAGING }}
          TF_VAR_groq_api_key:           ${{ secrets.GROQ_API_KEY }}
          TF_VAR_anthropic_api_key:      ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Promote images from dev → staging
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          for app in api portal; do
            docker pull ghcr.io/everythingcloudsolutions/familyshield-$app:${{ github.sha }}
            docker tag  ghcr.io/everythingcloudsolutions/familyshield-$app:${{ github.sha }} \
                        ghcr.io/everythingcloudsolutions/familyshield-$app:staging
            docker push ghcr.io/everythingcloudsolutions/familyshield-$app:staging
          done
          echo "✅ Images promoted to staging"

  integration-tests:
    name: "Integration tests — staging"
    runs-on: ubuntu-latest
    needs: deploy-infra-staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Playwright E2E tests
        run: |
          cd apps/portal
          npm ci --prefer-offline
          npx playwright install --with-deps chromium
          npx playwright test --reporter=github
        env:
          BASE_URL: https://familyshield-staging.everythingcloud.ca
          TEST_PARENT_EMAIL: ${{ secrets.TEST_PARENT_EMAIL }}
          TEST_PARENT_PASSWORD: ${{ secrets.TEST_PARENT_PASSWORD }}
