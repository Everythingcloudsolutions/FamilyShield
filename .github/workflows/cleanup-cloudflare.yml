# .github/workflows/cleanup-cloudflare.yml
# Cleanup Cloudflare resources (tunnel, DNS, access apps) via API
# Triggered manually when environment is torn down or on deployment failure
name: Cleanup → Cloudflare

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment: dev | staging | prod"
        required: true
        type: choice
        options: [dev, staging, prod]

permissions:
  contents: read

jobs:
  cleanup:
    name: "Cleanup Cloudflare — ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cleanup
        run: |
          bash scripts/cloudflare-api.sh cleanup \
            "${{ github.event.inputs.environment }}"
        env:
          CLOUDFLARE_API_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID:     ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Summary
        run: |
          echo "## 🗑️ Cloudflare Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Cleanup complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Resources deleted:" >> $GITHUB_STEP_SUMMARY
          echo "- Cloudflare Tunnel" >> $GITHUB_STEP_SUMMARY
          echo "- 4 DNS CNAME records" >> $GITHUB_STEP_SUMMARY
          echo "- 2 Access Applications" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> To redeploy, run **Deploy → Dev** workflow" >> $GITHUB_STEP_SUMMARY
